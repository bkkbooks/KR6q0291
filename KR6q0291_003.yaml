body:
  text: 嗣法子文編示黃太尉鈐轄此道幽邃極於天地未形生佛未分湛然凝寂為萬化之本初非有無不落塵緣煒煒燁燁莫測涯際無真可真無妙可妙超然居意象之表無物可以比倫是故至人獨證頴脫泯然淨盡徹此淵源以方便力直下單提接最上機不立階級所以謂之宗乘教外別行以一印印定遂撥轉關捩不容擬議至於拈花微笑投針舉拂植杖抵几瞬目揚眉悉出窠窟理道語言路布如擊石火似閃電光瞥然迅急萬變千化曾無依倚透頂透底截斷籠羅只許俊流不論懵底正要具殺人不眨眼氣槩一了一切了一明一切明然後特達絶死出生超凡入聖蘊遠見高識居常不露鋒鋩等間突出則驚群動衆蓋深根固蒂覷破威音王已前空劫那畔與即今日用無異無別既能行持有力堪任重致遠得大自在促三祇為一念衍七日作一劫猶是小小作用況擲大千於方外納須彌於芥中乃家常茶飯爾昔裴相國得旨於黃檗楊大年受印於廣慧維摩手搏妙喜界龐老一口吸西江豈難事哉唯直領此大因緣而已既有此道之基本時中能不聽人處分略操勇猛向應酬指呼之際著眼運快機利智轉一切萬有回自己掌握舒卷縱擒則與上來大達抱道蘊德踐履純熟之士豈有異耶但使源源相續無間斷便是長生路上快活人也祖師云心隨萬境轉轉處實能幽隨流認得性無喜亦無憂才於轉變處得幽深之旨向流動時徹見本性超出二邊不居中道安可更存違順憂喜愛憎令罣礙自受用哉以心傳心以性印性如水入水似金博金樂易平常無為無事遇境逢緣不消一劄德山行棒臨濟用喝雲門睦州風旋電轉何遠之有唯不徇情轉蓋色騎聲超今越古向百草顛頭快行劒刃上事所以道撥開向上一竅千聖齊立下風鳥窠吹布毛俱胝一指頭趙州三喫茶禾山四打鼓雲門須彌山洞山麻三斤鎔瓶盤叉釧為一金攪酥酪醍醐為一味不出至微至奧無上道妙矣嚴陽尊者問趙州一物不將來時如何州云放下著復徵既一物不將來教某放下箇什麼州云看你放不下渠即大悟豈不是靈利解言下返照直截透徹忘懷絶念大解脫根源踏著本地風光契合本來面目以此一句證却則千句萬句根塵俱謝默契心宗便非他物後來便伏毒蛇降猛虎顯不可思議靈驗豈不為殊特哉送雷公達教授靈山釋迦文百萬億賢聖會集龍象如林皆超群越衆大器大根可以迎風投契隔嶽隔海領略豈止聞一知十舉毛塵徹見至微至隱底蘊宜乎未明先見不遺毫髮及至拈花獨金色頭陀微笑黃面老乃開懷展手了不覆藏便道吾有正法眼涅槃心分付之令善護持厥後果的傳二十八世雅當開證初祖到今流通真規不墜是時文殊普賢彌勒金剛藏觀世音悉拱默聽之何也嘗鞠其至趣蓋當授受之際豈不慎許可而然哉雖以眼照眼以聖繼聖羽翰步驟體裁莫不絶去蹊徑唯單提獨用向上一著子實千聖不傳之妙萬靈景仰之宗出格越情絶凡脫聖輝天焯地耀古騰今是故歷二千年渾如目擊只阿難詢由來謂金襴之外別示何法迦葉遽呼待渠應諾即云倒却門前剎竿著此與向來拈花微笑何所異同則綿綿聯聯初無二致傳燈録寶林傳所載靡不如水入水似金博金所以達磨唱云直指人心教外別行故不忝爾溈山云此宗難得其妙切須子細用心可中頓悟正因便是出塵階塹著破布百衲頭鬅鬙腳踉蹌稠人中看之不直半分文驀地打徹翻却無量生業識種子向百不知百不會處信口道信手拈不知有底如鴨聽雷只眨得眼後來楗頭便領千群萬衆若固有之往往大有道宗師比比皆是至如居貴勢作卿相如裴相國陳操尚書白樂天王常侍本朝楊大年文公李都尉駙馬驚群敵聖信徹見透受用無盡率皆稟奇謀異見不蹈襲世間而圖出世間津梁乃如此山僧所稟寡昧偶憤發欲攀躋先哲所造詣殊無過人作略但操守久之以微有信因不善晦出而為人蹉跎四十餘載每遇傑出英才必傾倒羅列隨所向任機緣專一唯在箇中撥轉一句一言透頂透底明千聖頂上得大自在解脫力用而已果能有濟度盡六地群靈舉而置之安樂無為無事穩密之地則與迦文金色下至六代祖唐宋大達將相豈有異耶源深流長根牢蒂固不妄許與乃為真實諦當英靈豪俊解脫大士也巨濟了然朝奉根腳下各具此段惟宿植深厚之士於世諦緣輕有力量能自擺撥長時退步孤運獨照潔清三業端坐參究妙省明脫向自己分上離見絶情壁立萬仞放舍無始劫來深習惡覺摧碎我山枯竭愛見直下承當千聖莫能移易萬象不可覆藏輝天焯地乃佛乃祖直指妙嚴清淨本有金剛正體向百匝千重不能辨別處著得眼八縱七橫了無分割處下得刃機出物先言超意表灑灑落落湛湛澄澄轉變自由力用活脫於從上來克證上流同得同用無異無別等間地只守靜默初不露鋒鋩似箇癡兀人隨緣放曠飢餐渴飲與常時無以異所謂不驚群動衆密密顯用發大機久之到純熟安間穩實之地更有甚間東破西煩惱生死可拘束得是故古之有道宿德令人既脫根塵當弘密印三十二十年做冷寂寂地工夫才有纖毫知見解路隨即掃拼亦不留掃拼之迹撒手那邊全身放下硬糾糾地得大快活唯恐知有如是作略知則禍事也始是真實踐履也不見三老師趙州洞山投子皆贊重無心境界實欲後學也與麼去若呈機關語言辨慧知解正是染污心田卒未能可以入流靈山拈花少林面壁多少人穿鑿不依本分殊不知將口頭聲色捫摸作用大似刺腦入膠盆若是俊流他應不爾已能探討必意其遠者大者到結交頭驗諦實所以得底人雪鼻涕亦無工夫且道他向甚處行履將知教外單傳不是造次承當望空摶邈一一透頂透底蓋天蓋地如師子兒游戲自在軒豁時直是軒豁綿密處直是綿密雖只是一段腳跟到究竟須自著精采乃為實頭受用示張仲友宣教要探賾此箇大因緣惟利根上智終較省力然須用作一段緊要事常時靜却己見使𮌎中脫然回光覷捕內外虗寂湛然凝照到一念不生處徹透淵源翛然自得體若虗空莫窮邊量亘古亘今萬象籠羅不住凡聖拘礙不得淨倮倮赤灑灑謂之本來面目本地風光一得永得盡未來際更有甚生死可為滯礙至於小小得失是非榮枯寂亂直下截斷把得住作得主長養將去一心不生萬法無咎只是切忌起見作承當便落彼我必生愛憎不能脫灑也此箇無心境界無念真宗要猛利人方能著實祖師西來只是直指人心令人見性成佛既明信入此心信得及萬緣放下常令𮌎次空勞勞地此長養聖胎入真正修行也若確實未有箇諦當處時中逢境遇緣即紛紛擾擾易得隨一切物轉長墮在生死纏縛中應須快著精彩但念無常以生死為大事向逐日日用之中行時行時看取坐時坐時看取著衣時著衣時看取喫飯時喫飯時看取直下腳跟有箇發明處深信此大事因緣從空劫那邊以至父母未生前合下圓明朗照只如即今日用之中又何曾虧缺一處透得千處百處無遺所謂處處真處處真塵塵盡是本來人真實說時聲不現正體堂堂沒却身則一塵才舉大地全收遍法界都盧是箇自己更向何處著眼耳鼻舌身意軒知無二無別如水入水如金博金真如如實際大解脫也昔于頔相公裴休相國本朝楊億內翰李遵明大尉皆稟利根種智長與方外老宿辦心參究悉有契證不失為賢達蓋根性非於一世薰炙也于公見紫玉問佛紫玉呼渠應喏玉云只這是裴公問黃蘗高僧蘗云更莫別求楊大年參透廣慧老有頌云八角磨盤空裏走金毛師子喚作狗擬欲翻身北斗藏應須合掌南辰後李都尉見石門大悟有頌學道須是鐵漢著手心頭便拌直趣無上菩提一切是非莫管四心所謂豈有異耶但發明心地直透本根既爾諦實隨所作用無別道理也五祖老師常問過去心不可得見在心不可得未來心不可得三心既不可得畢竟心在什麼處山僧常時示參衆龐居士問馬大師不與萬法為侶底是什麼人馬師云待汝一口吸盡西江水即向汝道若體究得畢竟心落處即領略得一口吸盡西江水才生異見起一念疑心即沒交涉也要須放下諸緣雜知雜解令淨盡到無計較處驀爾得入即打開自己庫藏運出自己家財也示德文居士朴實頭腳跟著地修行淨意是大便宜所謂說得一丈不如行取一尺然見性悟理情念俱捐𮌎次廓然離一切相融徹虗通然後透頂透底物我一如生與死齊佛與衆生等至於動靜語默觸處逢原舉一毫一塵靡不該收然後日用之中如踞地師子誰敢當前乃一相一行得遍行三昧根機既脫一出無心才有纖微悉皆截斷方是向上人行履所以古老貴參玄之士先悟妙心行無修之修證無證之證不用向外馳求只自回光便了不見古人投機隔江招扇倒却剎竿竪指吹毛見桃花聞擊竹皆是契證處佛法豈有許多來正要絶伎倆當陽便承當即是安樂修證之地也示興祖居士脫虗妄纏縛破生死窠窟第一要根器猛利軒豁次辦長久不退之心俾力量洪深境界魔緣撓括不動而以佛祖大法印定本心此心乃真淨明妙卓然獨存虗空世界有成壞此段初無改移直下專一操存探究令透頂透底物我一如徹下通上只箇金剛正體了了無毫髮遺漏瑩徹玲瓏萬年一念初縱未全抵死擺撥日近日親絲來線去養得純熟向二六時一切境中著著有出塵之意出身之路持清淨戒而無執戒之念浩浩修行而不存功用一往不留蹤跡自然與古來得道之士同儔是故耆宿論悟入修證得坐披衣向後自看正要人作無間道中工夫也況生死事大多少人臘月三十日腳忙手亂大率在平時安穩一往粗浮隨塵緣輥了逗到時節到來臨渴掘井豈做得辦也人生一世不早回頭百劫千生等間蹉過今既知有此段只在堅固向前損諸知見撥棄妄緣長教𮌎中灑灑落落無一塵事或妄想起急須撥置令翛然無住本性常明明亦不取凜凜如吹毛劒誰敢當鋒一切語言道斷心行處滅要行即行要住即住聖亦不收凡亦不屬豈不是了事凡夫耶所以從上來人誨示訓導唯務無心非無真心但無一切淨穢依倚分別知解執著之心耳此發心學道悟入修行方便次第也示超然居士趙提刑曹山辭悟本問向甚處去云不變異處去復徵云不變異豈有去也答云去亦不變異自非踏著實處安能透徹如此豈以語言機思所可測量哉蓋履踐深極到無滲漏之致然後羅籠不住學道之士立志外形骸一死生混古今絶去來要須攀上流造詣至真諦實淵奧閫域打辦自己拔白露淨無絲毫意想墮在塵緣直下心如枯木朽株如大死人無些氣息心心無知念念無住千聖出來移換不得乃可以向枯木上生花發大機起大用興慈運悲乃無功之功無作之作豈落得失是非哉才留一毫毛則抵捂於生死界自己未能度安可度人維摩大士不住金栗位入酒肆淫坊作大解脫佛事示魏學士覿面相呈即時分什了也若是利根一言契證已早郎當何況形紙墨涉言詮作路布轉更懸遠然此段大緣人人具足但向己求勿從它覔蓋自己心無相虗間靜密鎮長印定六根四大光吞群象若心境雙寂雙忘絶知見離解會直下透徹即是佛心此外更無一法是故祖師西來只言直指人心教外別行單傳正印不立文字語句要人當下休歇去若生心動念認物認見弄精魂著窠窟即沒交涉也石霜道休去歇去直教唇皮上醭生去一條白練去一念萬年去冷湫湫地去古廟裏香爐去但信此語依而行之放教身心如土木如石塊到不覺不知不變動處靠教絶氣息絶籠羅一念不生驀地歡喜如暗得燈如貧得寶四大五蘊輕安似去重擔身心豁然明白照了諸相猶如空花了不可得此本來面目現本地風光露一道清虗便是自己放身舍命安間無為快樂之地千經萬論只說此前聖後聖作用方便妙門只指此如將鑰匙開寶藏鎖門既得開觸目遇緣萬別千差無非是自己本分合有底珍奇信手拈來皆可受用謂之一得永得盡未來際於無得而得得亦非得乃真得也若不如是便落有證有得相似般若中却不究竟也既豁然達得此根本分明然後起力作用正好修行二六時中孜孜履踐不取一法不捨一法當處圓融處處是三昧塵塵是祖師而不留勝解之心專行無人無我平等一相大道奉戒持齊精修三業令純淨無染滴水滴凍乃至六度萬行一一圓通發大機啓大用展轉令一切人信此參此悟此須行解相應慎勿作撥無因果漭漭蕩蕩魔邪見解才作此即謗般若却招惡報去所以佛祖垂教謂之清淨明誨當須依此正因然後當證妙果所有一生力量正要透脫死生若一念圓證念念修行以無修而修無作而作煉磨將去於一切境不執不著不被善惡業緣縛得大解脫到百年後翛然獨脫前程明朗劫劫生生不迷自己便是千了百當此皆顯不落言詮玄妙機境之致應當冥心體究俾透徹塵勞證清淨妙果示嘉仲賢良全心即佛全佛即人人佛無異始為道矣此諦實之言也但心真則人佛俱真是故祖師惟直指人心俾見性成佛然此心雖人人具足從無始來清淨無染初不取著寂照凝然了無能所十成圓陀陀地只緣不守自性妄動一念遂起無邊知見漂流諸有根腳下恆常佩此本光未嘗曖昧而於根塵枉受纏縛若能蘊宿根遇諸佛祖師直截指示處便倒底脫却膩脂衲襖赤條條淨倮倮直下承當不從外來不從內出當下廓然明證此性更說甚人佛心如紅爐上著一點雪何處更有如許多忉怛也是故此宗不立文字語句惟許最上乘根器如飄風疾雷電激星飛脫體契證截生死流破無明殼了無疑惑直下頓明二六時中轉一切事緣皆成無上妙智豈假厭喧求靜棄彼取此一真一切真一了一切了總萬有於心源握權機於方外而應物現形無法不圓何有於我哉要須先定自己落著立處既硬糾糾地自然風行草偃所以王老師十八上便解作活計香林四十年乃成一片塵勞之儔為如來種只在當人善自看風使帆念念相續心心不住向此長生路上行履即與佛祖同德同體同作同證況百里之政併在手頭安民利物即是自安萬化同此一機千差並此一照盡剎塵法界可以融通何況人佛無異耶示方清老老達磨來自竺乾豈嘗持一物及游梁歷魏面壁少林無人識渠獨可祖效勤立雪斷臂始略垂慈由此即心若謂無言從何而入如謂有言向伊道甚將知須是箇人始十分領略乃無滲漏所以入此門來要是根器猛利能疾速棄捨從前知見解路使胸次空勞勞不留毫髮洞照虗凝言思路絶直契本源泯然無際自得本有無得妙致方號信及見徹猶有無量無邊難測難量大機大用在儻留些能所墮在緣塵則卒急未便相應是故古德勸令直下休去歇去此段譬如快鷹梢雲突日迷風背箐掀騰直截不容擬議苟或躊躇乃蹉過也其為教外別行從可知矣既有志於是請放下著覿體承當一切成現則初祖不曾來自己亦無得示李宜父此道最徑要不出一言而此言非佛口所宣非諸祖所道若謂即心非心即佛非佛則刻舟守株了無交涉若默識此言豈墮唇吻趂塊之流遂妄卜度以為瞬揚舉動未夢見在殊不知從上來體裁步驟且不是作聰明立知見論權實照用境界抑不得已遂按下雲頭棒喝交馳星飛電擊俊底聊聞即知落處且畢竟是那一言莫是柏樹子須彌山露親瞎普錯俱見知麼莫是擔板漢勘破了喫茶去珍重敢保老兄未徹在歇去參堂去麼並是依草附木精魅有底道是也祖師以佛語心為宗無門為法門便是錯認定盤星也直須待桶底子脫如睡夢覺大徹大悟然後可以承當此言也示韓通判透脫要旨唯在歇心此心知見生即轉遠直下歇到無心之地虗間寂靜雖萬變千轉非外非中了不相干自然騰騰任運照應無方便可以使得十二時用得一切法根本廓然不形彼我愛憎得失去來所謂任運猶如癡兀人他家自有通人愛示張國太此段大因緣乃佛乃祖特行獨唱接上乘人利根明敏之士要超情離見覺機關活卓卓地透漏未舉先諳未言先領才有朕兆一剪剪斷直下不明他事終不向意根下尋思要須打辦精神當陽承當擔負如太虗日輪無幽不燭所以從上古德到單提處不容毫髮編撥將去使淨倮倮赤灑灑不與萬法為侶不與千聖同獨脫超升自由自在去是故德山臨濟棒喝交馳出沒縱擒不在窠臼至於言語機用一時坐斷聖凡路絶得失情遣到大休歇場更喚什麼作生死胸次等間照亦不立遇緣即宗拈得出來蓋天蓋地據慈悲方便落草商量正要令利根人撥去妄緣惡覺知見徹空空處空空亦不存心如太虗森羅萬象無不包含印定頭頭處處得大解脫乃名了事底人亦尚未當得向上行履若論向上行履千聖密傳處豈止壁立萬仞隔千里萬里盡大地拈來未有一塵許謂之大用現前三十二十年長養純熟便乃契證也即心即佛已是八字打開非心非佛重向當陽點破不尋其言一直便透方見古人赤心片片若也踟蹰當面蹉過也不與萬法為侶底是什麼人待你一口吸盡西江水即向你道多少徑截省要何不便與麼承當更入它語言中則永不透脫多見學者只麼卜度下語要求合頭此豈是透生死見解要透生死除非心地開通此箇公案乃是開心地鑰匙子也只要明了言外領旨始到無疑之地昔修山主要見地藏自陳此番來見和尚經涉許多山川極是辛苦地藏指云許多山川與汝也不惡渠便桶底子脫去似此豈假多言道途之間也須保任始得示張子固大道無方惟是利根種性一聞千悟不從外起不自內得脫然如湯消冰初無得喪蓋此生佛未分已前廓徹明妙了無依倚卓然獨存但以一念逐緣背此真體遂生如許不相應事業熠熠地飄流無暫停息取境既熟心源混濁習以為常見聞皆不出聲色只以迷妄自縛及至體究大解脫渺渺茫茫莫知涯際識浪滔滔未嘗暫住故無由造入而復有宿昔薰炙片善喜樂諦信要求其所乃是上善逗到伏膺參叩却黑漫漫地無它只是拋離久不純熟乃爾如今要直截承當但辦著身心冥然叩寂喪却心機一如土木待渠時節到來翛然自桶底子脫契此本光了此湛湛澄澄不變不動清淨無為妙淨明性固蒂深根到金剛堅固正體全身擔荷得行然後方可萬別千差悉歸一致動與靜一如心與境俱合則一明一切明一了一切了舉箇須彌山道箇庭前柏樹子一切機境豈從他發至於行棒下喝擎扠輥毬無不一一印定生死涅槃猶如昨夢自然泰定安間得休歇處更疑什麼要用便用要道便道遇飯喫飯遇茶喫茶契平常心不起佛見法見佛見法見尚乃不起何況起造業心發不善意終不作此態度撥無因果由是得坐披衣調衛降伏與無心相應乃是究竟落著之地永嘉道但自懷中解垢衣巖頭道只守間間地雲居道處千萬人中如無一人相似曹山道如經蠱毒之鄉水也不得沾它一滴謂之長養聖胎謂之染污即不得直須放下却從前作解一切淨穢二邊之像行住坐臥悉心體究乃自著底力非從它人所授乃是從上古德捷徑也示元賓佛祖大因緣非名字語言知見解路作聰明起思惟所了要忘懷忘緣外空諸相內脫識情退守清虗安間澄徹洞然超諸方便直透本來妙心亘古亘今湛然不動萬年一念一念萬年永無滲漏諦當之地一得永得無有變異乃謂之直指人心見性成佛然此如上所說尚是理論以言遣言以理會理令人漸有趣向從前為入理蹊徑拖泥涉水廉纖之論及至真實提掇何有如是周遮是故靈山拈花迦葉乃笑是中豈可容毫髮說底道理要須透頂透底盡大千剎海一舉便透悉知落處方諳悉從上來所行正令德山棒臨濟喝豈小兒戲耶若具本分作家手段不須一劄所以龐老問石頭馬祖不與萬法為侶是什麼人石頭掩其口而馬師道待你一口吸盡西江水即向你道豈二端耶鞠其至趣同是入泥入水安可高下淺深之到箇裏直須知有既知有更須轉去始得切忌守死語墮窠窟才有一毫芒能所作用玄妙理性見刺刺人卒未撥剔得下作麼生透脫死生證安樂無為不動境界去古人重履踐一門得坐披衣向後自看是也切須管帶使得力乃善古賢達具大根器能自證明又能力行之喚做作二夫長時只覷自己起心動念才有毫髮即及令淨盡終不用作一種事業資談柄期勝於人而伏人長知見作能作勝圖聲名實頭只為死生大事百劫千生不昧不陷墜古來大有不惜眉毛為人指出處雲門覿體全真臨際坐斷報化佛頭德山無事於心於心無事則虗而靈寂而照巖頭只守間間地一切時中無欲無依自然超諸三昧趙州道我見百千箇漢子只是覓作佛底中間覓箇無心道人難得但熟味其言休心履踐它時異日逢境遇緣乃得力也要當慎護勿令滲漏乃祕訣也裴相國見黃檗言下有契證更為發揮傳心祕要再三叮嚀無限量慈悲于頔襄陽參紫玉一喚便回頭重為指黑風飄船見墮羅剎國方得渙然自古士流肯重此事廢寢忘餐直下見諦者不勝數皆由當人根力智見高明爽快然後能訪尋決擇今既與古為儔尤宜力行不退圖深證深入勿只尚口頭語言必使心心不觸物頭頭無處所始得此道貴單提獨證與祖佛向上機契合高出心源如擊石火閃電光不容擬議尋伺直下便透不落意根情想以至說理說性於機境語句中作窠窟立解會遞互傳持說唯心融地水火風以虗空為量喚作透根塵下事只成理論不出教家三乘五性權立階梯返成鈍置當須了取未有佛祖已前箇片田地從甚處來才有纖毫有所得乃是相似般若應深辨別勿墮塵機到臘月三十日理地不明斷割不去那時慞惶繆亂悔不可及也五祖老師常示學徒須參臨命終時禪此非小事設使聰明辨慧八達七通纖洪理論絲來線去不出識學詮文正是打骨董究竟無截斷處所以從上古德大有道宗師與利根上智奇特之士如陸亘大夫王敬常侍裴相國甘贄道人陳操尚書崔群李翱杜鴻漸龐老李勃于頔本朝楊內翰大年李附馬諸人莫不探賾體究八面玲瓏有腳踏實地處而能作人所難作行人所難行為內外護於大法海中津濟帳㨾不虗出南閻浮提一遭古人既爾今豈只守尋常不以自己死生大事及洪持道妙為至要放令諸塵緣境牽惹纏縛名言句數籠羅無出格之作向上眼目大解脫機為可惜大丈夫漢已能打破面皮參請應須通身是眼照破幻緣金剛寶劒截斷愛網雖在士流現宰官身筆頭上好作方便指揮處好行祖令使一切聞見皆知因果俱識起倒便是與古為儔也末後一句始到牢關把斷要津不通凡聖咄不可只管落草開眼作夢也須向頂𩕳上施展始得示曾少尹佛祖妙道唯在各人根本上實不出本淨妙明無為無事心矣雖久存誠未能諦實蓋無始聰利智性多作為而汩之但教此心令虗間寂靜悠久湛湛如如不變不易必有大安隱快樂之期所患者休歇不得而向外覔作聰明也殊不知本有之性如金剛堅固鎮長只在未曾斯須間斷若消歇久驀地如桶底子脫自然安樂也若求善知識廣要持論則轉遠矣惟是猛利根性猛自割斷猛自棄捨當有證入自知之矣既知之後知亦不立始造真淨境界以公道契之外故強言之可照之區域之表也示蔣待制此段事天人群生至於佛祖皆承威力但以群靈雖蘊此而冥昧枉受沉溺佛祖達此而超證迷悟雖殊其不思議一也是故佛祖開示直指莫不令一切含靈各各獨了自己本來圓具清淨妙明真心更不留如許塵勞妄想計念知見直向五蘊身田回光返照湛寂如如廓爾承當明見此正性此性即心此心即性浩浩作為應在六根門頭千變萬化初不搖動故號常住本源若達此本力用所作無不透徹須是截流而證若踟蹰動念則沒交涉也唯是當人根性素來純靜深沉為最易為力只略返照一透便可證入古人謂此為無盡藏亦名如意珠亦號金剛寶劒要深具信根信此不從他得行住坐臥凝神寂照淨倮倮地無間無斷自然諸見不生契此正體不生不滅非有非無無實無虗離名離相即是當人本地風光本來面目也古德所以揚眉瞬目拈槌豎拂行杖行喝微言妙句百千億方便無不令人向此透脫一才透得便深徹源棄却敲門瓦子了無毫髮當情三十二十年於中履踐截斷路布葛藤間機破境翛然無心乃安樂之歇場也所以道即今休去便休去若覓了時無了時摩竭掩室毗耶杜詞人皆以為極致殊未夢見渠腳指頭在大人大見大智大用豈拘格量哉直是痛的的地恨不兩手分付那論淺深得失彼我現量紛紜和泥合水耶且如佛未出世祖師未來世界未成虗空未現向甚處捫摸要須喪却機心死却知見脫去世智辨聰放下直如枯木朽株相似驀地體得到絶氣息處淡然忘懷萬年一念將養保衛久久純熟子細返觀便諳得摩竭淨名來脉也趙州臨示寂封一柄拂子送與鎮府大王云此是老僧一生用不盡底原其高識遠見豈令人滯於相執於言縛於葛藤耶唯直了證則活鱍鱍有出群作略乃能擔負如水入水似金博金也襄陽郡將王常侍參溈山大圓得旨一日有僧從溈山來常侍問山頭老漢有何言句僧云人問如何是祖師西來意溈山豎起拂常侍云山中如何領解僧云山中商較即色明心附物顯理侍云會便會著甚死急汝速回去待有書與老師僧馳書回溈山拆見畫一圓相於中書箇日字溈山呵呵大笑云誰知吾千里外有箇知音仰山云也只未在溈山云子又作麼生仰山於地上畫一圓相書箇日字以腳抹之而去看他得底人步驟趣向豈守窠窟則箇裏若善觀其變則能原其心既能原其心則有自由分既有自由分則不隨他去也既不隨他去何往而不自得哉每接士大夫多言塵事縈絆未暇及此待稍撥剔了然後存心體究此雖誠實之言然一往久在塵事中口以塵勞為務頭出頭沒爛骨董地熟了只喚作塵事更待撥却塵緣方可趣入其所謂終日行而未嘗行終日用而未嘗用豈是塵勞之外別有此一段大因緣耶殊不知大寶聚上放大寶光輝天焯地不自省悟承當更去外求轉益辛勤豈為至要若具大根器不必看古人言句公案但只從朝起正却念靜却心凡所指呼作為一番作為一番再更提起審詳看從何處起是箇甚物作為得如許多當塵緣中一透一切諸緣靡不皆是何時撥剔即此便可超宗越格於三界火宅之中便化成清淨無為清凉大道場也法華云佛子住此地即是佛受用經行及坐臥常在於其中示寧禪人死生之變亦大矣衲僧家坐斷報化佛頭不立纖毫知見直下透脫要萬年一念一念萬年死死生生生生死死打成一片不見毫末起滅輪轉所以道任是千聖出頭來終是向渠影中現試問渠正體作何形段須知空劫已前由地建立至於窮華藏浮幢王剎盡未來際亦因他成就若是上根利智脫却無始劫來虗妄染污聖凡情量向腳根下猛省直透棄捨一切依倚聞見覺知色聲味觸如紅爐上著點雪灑然淨盡無量珍寶於中運出無邊勝相於中顯現亦於本心初無彼我是非勝負欣厭便與本來無二無別更喚甚作生死喚甚作小大冥然岑寂得大安穩始知從來不曾喪失亦不缺少豈不見石頭問藥山汝在此作什麼山云一物不為頭云恁麼則間坐去也山云間坐則為也頭云汝道不為不為箇什麼山云千聖亦不識石頭乃有頌從來共住不知名任運相將只麼行自古上賢尤不識造次凡流豈可明看渠師資踐履趣向如此可不是本分事耶既圖參問宜乎追慕使古風不墜乃自己行腳事辦也示勝上人大道體寬無易無難小見狐疑轉急轉遲若達大道體寬廓然同太虗空放懷曠蕩觸處皆真不拘限量有何難易信手拈來蓋天蓋地含育十虗而不作相若才作毫毛知見解礙則墮知見究徹不及返生狐疑所以此道唯務大根利器直下承當脫然惺悟便休更不作限量知見萬別千差一劒截斷等間不立勝負惟務退藏似兀如癡孤運獨照融通𭰞合密密綿綿佛眼亦覷不見況乎魔外長養成就自然有入心入髓之功便於根塵違順死生亦咬得斷終不疑著此乃無心無為無事大解脫境界既然圖欲預此勝流當須切切孜孜放下身心體究一句一機一境上發明悟入無量無數作用公案一時穿透才拈得來更不放過便與截斷豈不快哉示琛上人僧問趙州如何是祖師西來意州云庭前柏樹子不妨省力如今參問之士性識昏昧只管去語言上咬至了不奈何下梢無合殺遂滿肚懷疑多作異見異解蹉却本分事殊不知不在言語上又不在事物邊如擊石火閃電光略露風規才擬承當早落二三也若要直截應須退步就己歇却狂心使知見解礙都盧淨盡時節緣熟瞥然明證亦不為難似恁麼話早葛藤了也且作死馬醫會當有趣入處但一則公案上透頂透底信得及到無疑之地餉間千種萬端改頭換面長句短句多句少句有句無句一時透脫豈有兩種也所謂直指人心見性成佛一得永得據自寶藏運自家財受用豈有窮極也不見德山在龍潭吹紙燭豁然瞥地便道從今日去不疑天下老和尚舌頭也後來住山打風打雨不妨性懆但恁麼參但恁麼證恁麼用辦取肯心必不相賺示英上人道妙至簡至易誠哉是言未達其源者以謂至淵至奧在空劫已前混沌未分天地未成立杳冥恍惚不可窮不可究不可詰唯聖人能證能知是故誠其言不識其歸趣安可以語此事哉殊不知人人根腳下圓成只日用之中淨倮倮地被一切機遍一切處無幽不燭無時不用但以背馳既久強生枝節不肯自信一向外覔所以轉覔轉遠是故達磨西來唯言直指人心而已此心即平常無事之心天機自張無拘無執靡住靡著與天地齊德日月合明鬼神同吉凶無容立毫髮見刺唯蕩然大通契合無心無為無事若立纖芥能所彼我即隔礙永不通透所謂無明實性即佛性幻化空身即法身若能無明殼子裏證得實性餉間無明全體一時發揮幻化空身窠窟中見法身餉間空身全體都盧瑩徹第恐於無明空身中作為立見則沒交涉也既透此正體無明空身無別發明則一切萬有大地山河明暗色空四聖六凡皆非外物真實諦當則二六時中大方無外何處不為自己放下身心處豈不見古者道塵勞之儔為如來種觀身實相觀佛亦然然後世法佛法打成一片等間喫飯著衣即是大機大用則行棒行喝百千作為機境豈更疑著若達此自腳跟下至簡至易道妙無量法門一時開現透脫生死成勝妙果豈有難哉示圓上人古來有志之士既圓頂相即超方訪道誠不以一身使虗來閻浮提打一遭所以刻意息心擇真正具頂門宗眼知識放下復子靠取成辦觀其跂步真龍象也今既蘊趣向大因緣之志要當盡形壽專一堅確忘餐廢寢不憚辛勤效勞忍苦若體究之攸久自有信入處耳況此一段因緣自己分上元本圓成未嘗缺闕與佛祖無殊但以起知作見強生節目情執虗僞不能直下實證若宿植根性敏利一念不生頓超二十五有圓證自己本有如如妙性更不生毫髮許能所彼我廓然大達聖凡平等彼我如如是佛更不覔佛於心初不求心佛心無二所至現成二六時中更不落虗僞便乃腳踏實地打開自己庫藏運出自己家財隨所發機悉超宗格透得真實活鱍鱍地雖遇德山臨濟雲門玄沙施難測難量妙機不消一劄所謂多虗不如少實但令最初發心猛利不移相續到徹頭處不憂自己道業不辦大丈夫兒須了却向上大機大用安穩快樂始是泊頭時切勿小了切宜久遠業業競競自然得豈不解脫去示照禪人石鞏三十年一張弓兩隻箭只射得半箇人為甚不全去蓋是中豈可容如此何故不見道向上一路千聖不傳若體得不傳之意則盡底裏直言此事無你用心機處無你湊泊存坐處是故從上來唯是特唱直指要人格外玄悟不拖泥水不墮塵緣所以道他上流聊聞舉著剔起便行萬機收他不著千聖籠羅他不住要如是參究證入要如是提掇舉唱豈論懵底箇箇須眼似流星殺人不眨眼始得相應若踟蹰凝佇則蹉却千萬了也有此一至寶之地乃可以建立萬差儻真實到恁麼終不揑怪作相畫㨾起摸只守間間尚不可得至於立己透脫為物解黏去縛無不皆是踞地時節臨濟道山僧見處也要諸人共知直下坐斷報化佛頭據此垂示既坐報化佛向上更有箇甚豈是世間粗想所度要須打拼從前妄想計較執著情塵勝劣見解明辨性理終非本分一刀截却直得脫然自得如毫末許盡十方界塵無不包攝全作用是佛祖全佛祖是作用一棒一喝一句一機並無窠窟一切以實證印之如靈藥點鐵成金無不皆從我轉既久參問多作知見解路只益多聞終非實事須一歇一切歇一了一切了見此本來面目達此本地風光然後作為一切成現不假心力如風偃草雖山林城市亦無二種喚作把得住作得主權衡含生命脉在自手中隨心意作何判斷便謂之無用道豈非至要至妙安穩大解脫哉示鑑上人祖師門下本分提綱一句截流萬機寢削已是涉廉纖了也何況言上生言機上生機窮考許多一堆擔葛藤汙却心田有甚了期此事若在言句機境上盡被聰明解會浮根虗識者如學事業一般逴將去了也豈更論發悟見性耶釋迦佛一周出現無窮奇特勝妙尚只道曲為時緣至末梢始密付此印達磨老師少林九年冷坐獨有可祖承當得故謂之教外別行單傳心印只如此印且如何傳莫是揚眉瞬目麼莫是舉拂敲床麼莫是總無言說只以行住動用麼莫是總不與麼便承當麼莫是向上向下面前背後別有奇特麼莫是道理論性深入淵源麼似此正如掉棒打月有甚交涉將知非世間粗浮淺識所料要須如龍象蹴踏直超升大徹大證始得一等參請須教透去莫只守住窠窟不唯自賺亦乃纍人所以從上來作家宗師仰重此一段不輕分付不輕印可不見永嘉道粉骨碎身未足酬一句了然超百億祕魔平生只持一木杈見人便道甚魔魅教你出家甚魔魅教你行腳道得也杈下死道不得也杈下死原其一場豈是虗設蓋入草求人爾若是知有底豈有多端才涉紛紜即千里萬里也跳得金剛圈吞得栗棘蓬自然知落處此宗省要唯是休意休心直令如枯木朽株冷湫湫地根塵不偶動靜絶對根腳下空勞勞無安排存坐它處脫然虗凝所謂人無心合道道無心合人至於應物隨緣不生異見只據現定一機一境悉是坐斷更說甚麼棒喝照用權實一擬便透唯我能知更無餘事長時如此履踐何憂本分事不辦耶示祖上人如祖上人自德山來久以此段為務見蔣山佛果何曾有兩種佛法若擔帶來是納敗闕不擔帶來須知轉身處始得如今時衲子到處叢林有宗匠莫不咨參然求一實證到本分田地得大休大歇安穩之場實難其人大丈夫兒已能是拋鄉離井在本分尊宿身邊又能效勤戮力作種種緣皆非分外亦足以不昧行腳然至諦實要須知有從上來事且從上來列祖相承至於德山臨濟行棒行喝作千萬種方便至竟要人何為應須似香象渡河截流而過了無疑礙尚未稱從上來事道人家相逢不拈出棒打石人頭不可向卷子上指東畫西去也只此已是漏逗了也歸德山舉似堂頭看它如何為你證據示宴禪人歸宗有僧來別宗云你但去束裝臨行來為汝說一上佛法其僧如言及至再上方丈歸宗云時寒塗中善為歸宗滿許渠說佛法其僧虗心欲聞所未聞而歸宗乃爾須知它古德於此事綿密無間若喚作佛法早是中毒藥也晏師來別不欲蹈古人腳迹也亦未免從頭起示從大師住筠州黃檗山衲僧家具眼行腳須知有本宗向上鉗鎚透頂透底淨倮倮不立階梯直截超升無纖毫隔礙大解脫金剛王印向萬機盤錯千聖交羅百億端緒撥不開處遂令受用使著著有出身之要頭頭脫絶塵之迹俾通身是眼底遍界羅籠不住底把斷放行不漏毫髮底龍馳虎驟電轉風旋底摸索不著等間蕩蕩地似兀如癡豈更做會禪面觜到處釘鬪機關詮注語句貼肉著骨論量向上向下有事無事埋沒宗風所以道他得底人只守間間地且道他得箇甚道理若有針鋒許有無得失我見我解則刺却命根須知如猛火聚近之則燎却面門如金剛劒擬之則喪身失命列祖出興只提持箇一段壁立萬仞既具大根器不受人瞞直下脫却向來依倚明暗兩岐放得下信得及活鱍鱍無窠臼廓然及得淨盡承當擔荷得從上來佛祖共證底於脫透生死破塵破的豈為難事乃可謂之真正本分衲子既有志於是宜悉圖之示祖禪人世尊拈花迦葉微笑二祖禮拜達磨傳心豈有他哉箭鋒相拄也當其神契理御非言思所測唯知有向上宗風者證之雖千萬億載猶旦莫也是故乃佛乃祖求之初不草草要是純剛打就利根上智然後提其要擊其節如膠投漆舉一明三阿轆轆地無窠窟絶滲漏底始可首肯更應淘汰煉到盤錯交加人所不能窮詰辨別處綽綽然有餘當受用時浸淫露手段有超宗越格不傍師旨獨出𮌎襟壁立千仞驚群敵勝方堪付授法既不輕道亦尊嚴所謂源深流長也從上古德動盡平生或三二十載靠箇入處期徹頭徹尾去志既有立用心堅確是以成就得來擲地金聲大丈夫兒攀上景仰不得不然彼既能爾我豈不能耶況透脫死生窮未來際一得永得當深固根本根本既固枝葉不得不茂但於一切時令常在勿使走作湛湛澄澄吞爍群象四大六根皆家具爾況知見語言解會耶一時到底放下到至實平常大安穩處了無纖芥可得只恁隨處輕安真無心道人也保任此無心究竟佛亦不存喚甚作衆生菩提亦不立喚甚作煩惱翛然永脫應時納祐遇飯喫飯遇茶喫茶縱處闤闠如山林初無二種見假使致之蓮華座上亦不生欣抑之九泉之下亦不起厭隨處建立又是贏得邊事何有於我哉大迦葉云法法本來法無法無非法何於一法中有法有不法古人得旨之後多深藏不欲人知恐生事也抑不得已被人捉出亦不牢讓蓋無心矣至於垂慈示方便亦只隨家豐儉如俱胝一指打地唯打地祕魔擎杈無業莫妄想降魔舞笏初不拘格轍勝負見務人各知歸休歇不起見刺向鬼窟裏弄精魂卓卓叮嚀到脫體安穩之地乃妙旨也靈利漢腳跟須知點地脊梁要硬似鐵游人間世幻視萬緣把住作主不徇人情截斷人我脫去知解直下以見性成佛直指妙心為階梯及至作用應緣不落窠臼辦一片長久守寂淡身心於塵勞透脫去乃善之又善者也示諸上人道本無言法本無生以無言言顯不生法更無第二頭才擬追捕已蹉過也是故祖師西來特唱此事只貴言外體取機外薦取自非上上機器何能驀爾便承當得然有志於是者豈計程限要須立處孤危辦得一刀兩段猛利身心放下復子靠著箇似咬猪狗惡手段底盡情將從前學解路布黏皮貼肉知見一倒打疊却使𮌎次空勞勞地己私不露一物不為便能徹底契證與從上來不移易毫髮許直得如此更知有向上超師作略始得所以古者問佛向上答非佛又答方便呼為佛則見性成佛乃筌爾是中云何指東畫西直須密契自能將護方得灑灑落落更說甚證涅槃契生死皆增語也雖然只小僧恁麼道也未可取為極則始免佛病祖病大丈夫漢圖心要參豈可立限劑耶但辦却深信一往向前未有不腳踏實地者日新日新日日新日損日損日日損退步到底便是也至了是亦不立此正是作工夫處示楊州僧正淨慧大師箇事唯憑作者通不論千里自同風聞名十載今相遇拈起金圈栗棘蓬維揚前僧正淨慧大師宗公得得渡江由鍾阜迂訪標誠為自己大因緣專請小參因說此偈塞其誠意蓋淨慧生平修持甚清潔其宿福緣所集如佛在世時須菩提室中寶藏充溢根性敏明殊無繫著了得失皆儻來物耳操心唯務究此一段相見雖暫爾而堅確深至矻矻孜孜因副所期為發其蘊祖師諸佛單傳顯示不出人人腳根下本有之性唯聖凡器界根塵正體歷劫以來曾未間斷但以各人人妄想緣塵翳障若發起本根大力量勇猛操持一念不生前後際斷直下明信此心明見此體寬若大虗明如杲日不分能所不作限量透頂透底直下徹證便透得即心即佛無別有心是佛無別有佛淨倮倮虗妙明通全無依倚如人打開無盡寶藏其中所有無不皆是自己珍財日用之中遍界不藏併入無念無心休歇境界所謂一句了然超百億餉間千般萬種千句萬句豈更差別耶如今要省力但知息却妄緣疑情淨盡處便是自己透生死處只此便是金圈栗棘應須直下領取示覺禪人佛祖宗乘唯務直截如香象渡河勢須徹底若稍踟蹰則千里萬里沒交涉是故從上古德行棒行喝機境處參如擊石火閃電光略露風規已是拖泥帶水落草了也豈更論量淺深得失偏圓事理解會明知是土上加泥所以俊流佩最上乘印似千日並照無幽不燭才見入門未舉目搖唇已先覷透心肝五臟蓋本分手段初無造作只貴快自承當剔起便行可以籠古今十方坐斷萬世千劫不移易絲毫許儻未能如是頓超亦須先自擺脫根塵妄緣以至淨妙殊勝理道待空豁豁地如桶脫底胸次蕩然疑情盡去勝解俱忘自然根本洞明與從上來同得同證曾無間隔乃是入理之門悟中之則終不向髑髏前見神見鬼認影認光墮在窠窟求出處不得只如古人道即心即佛又道非心非佛又道不是心不是佛不是物又道麻三斤又道鋸解稱鎚萬別千差若直下領略豈有二致所以一了一切了一明一切明只這明了也須斬作三段始得方入無事無為履踐諦當處耳示自禪人初發心人性識勇猛忘餐廢寢專誠堅碓為可喜況春秋鼎盛不戀鄉井溫煥依清高雅衆體究此一段大因緣是誠宿有大根器然更宜日慎一日業業兢兢直下脫灑滴水滴凍蹈規循矩既以為道之心代衆持盂不為不好事業要須居三家村裏亦如稠人廣衆所謂自作一叢林也袖疏投刺見人折節恭謹於日用中當自參取萬境萬緣皆為自己入路一塵中透脫遍界皆是大寶藏發此蘊奧八萬塵勞皆八萬波羅蜜轉物歸己隨處了心並為作工夫處是故古德道山僧為汝發機却有限不如他山河大地一切音聲及自己心念所起乃文殊普賢觀世音妙門豈不見寶壽作緣化於閙市見二人相爭傍人解勸你得恁無面目渠便桶底脫去後來出世打風打雨但一如初心專一不移將來自己七通八達到無疑之地自可超佛越祖透脫生死乃餘事耳示有禪人至道無難唯嫌揀擇誠哉是言才有揀擇即生心心既生即彼我愛憎順違取捨樅然而作其趣至道不亦遠乎至道之要唯在息心心既息則萬緣休罷廓同太虗了然無寄是真解脫豈有難哉是故古德蘊利根種智者聊聞舉著剔起便行快自擔當更無回互如大梅即佛即心龍牙洞水逆流鳥窠吹布毛俱胝豎一指皆是直截根源更無依倚脫却知見解礙不拘淨穢二邊超證無上真宗履踐無為無作今時學道既有志性當宜勉旃與古無儔心期證徹到腳踏實地處動用全歸本際千聖不可籠羅解會併亡得失俱脫乃是無欲無依真正自在自由道人也到此豈更論難之與易哉則無難無易亦了不可得也衲僧家句裏出身蓋提持向上機於無句中出句於無身中現身言語道斷心行處絶等間蕩蕩地放曠寬間才有機緣即蓋天蓋地所謂密密綿綿無間無隔不是強為任運如此是以諸天捧花無路魔外潛覷不見直得恁麼行履自然超諸三昧古人以無為無事為極致蓋其心源澄淨虗融灑落真實踐履到此境界然亦終不住滯於此直得如盤走珠如珠走盤豈是死煞頓住得底所以道雖是死蛇解弄也活長慶道撞著道伴交肩過一生參學事畢酌然若非獨脫安能知有此段信知須是恁麼人知有恁麼事僧問曹山因地而倒因地而起如何是倒山云肯即是如何是起山云起也明眼人透見更不別求只這片田地不妨嶮峻時直嶮峻平坦時直平坦立地也不可明得坐地也不可明得古人得意之後向深巖僻洞茅茨石室大休大歇放懷履踐忘名棄利與世不相關涉作自己成辦然後隨緣不出則已及至一出必驚群伏衆蓋源深流長也今既未能入深山窮谷但只依本分守淡靜如箇百不知百不會底人隨處守見成得安穩亦乃忘機之本也
