body:
  text: 嗣法子文編示華藏明首座住江寧府天寧祖師直示豈有如許蹊徑只貴向上人聊聞舉著剔起便行明眼覷來早是鈍置古者道舉一隅不以三隅反者吾不與也箇箇須是舉一明三目機銖兩轉轆轆地踈通俊快始稱提持豈不見良遂見麻谷第一番見谷便入方丈閉却門渠疑著及至第二次谷驟步去菜園裏渠便瞥地乃謂谷曰和尚莫謾良遂若不來見和尚洎被十二本經論賺過一生看渠恁地不妨省力既歸謂徒曰諸人知處良遂總知良遂知處諸人不知信知渠知處有不通風諸人卒未薦得可謂真師子兒要作他家種草直須更出他一頭地始得達磨游梁入魏落草尋人向少林冷坐九年深雪之中覔得一箇及至最後問得箇什麼却只禮三拜依位而立遂有得髓之言至令守株待兔之流競以無言禮拜依位為得髓深致殊不知劒去久矣爾方刻舟豈曾夢見祖師若是本色真正道流要須超情離見別有生涯終不向死水裏作活計方承紹得他家基業到箇裏直須知有從上來事所謂善學柳下惠終不師其迹是故古人道一句合頭語萬劫繫驢橛誠哉破有法王出現世間隨衆生欲種種說法將知所說皆為方便只為破執破疑破解路我見並無許多惡覺惡見佛亦不必出現而況說種種法耶古人得旨之後向深山茆茨石室折腳鐺子煮飯喫十年二十年大忘人世永謝塵寰今時不敢望如此但只韜名晦迹守本分作箇骨律錐老衲以自所契所證隨己力量受用消遣舊業融通宿習或有餘力推以及人結般若緣鍊磨自己腳跟純熟譬如間荒草裏撥剔一箇半箇同知有共脫生死轉益未來以報佛祖深恩抑不得已霜露果熟推將出世應緣順適開拓人天終不操心於有求何況依倚貴勢作流俗阿師舉止欺凡罔聖苟利圖名作無間業縱無機緣只恁度世亦無業果真出塵羅漢也僧問天皇如何是戒定慧皇云我這裏無恁間家具又問德山如何是佛山云佛是西天老比丘又問石頭如何是道答云木頭如何是禪云碌磚僧問雲門如何是超佛越祖之談答云糊餅又問趙州如何是祖師西來意云庭前柏樹子又問清平如何是有漏答云笊籬又問無漏答云木杓問三角如何是三寶答云禾粟豆是皆前世本分宗師腳踏實地本分垂慈之語若隨他語即成辜負若不隨他語又且如何領略除非具金剛正眼即知落處耳此門瞥脫契證却是素來未曾經人壞持拍盲百不知一旦以利根種性孟八郎便透直下承當要用便用要行即行無如許般心行純熟頓放著所在便得休歇安樂終日飽齁齁地不妨真正最難整理是半前落後認得瞻視光影聽聞不隨聲守寂湛之性便為至寶懷在胸中終日昭昭靈靈雜知雜解自擔負我亦有見處曾得宗師印證惟只增長我見便雌黃古今印證佛祖輕毀一切問著即作伎倆黏作一堆殊不知末上便錯認定槃星子也及至與渠作方便解黏去縛便謂移換人捩轉人作恁麼心行似此有甚救處除是驀地自解知非却將來須放得下為善知識遇著此等須是大手腳與烹鍊救得一箇半箇得徹不妨翻邪成正却是箇沒量大人何故只為病多諳藥性得底人心機泯絶照體已忘渾無領覽只守間間地而諸天捧花無路魔外潛覷不見深深海底行漏盡意解所作平常似三家村裏無以異直下放懷養到恁麼處亦未肯住在才有纖毫便覺如泰山似礙塞人便即擺撥雖淳是理地亦無可取若取著即是見刺所以道道無心合人人無心合道豈肯自衒我是得底人原他深不欲人知喚作絶學無為與古為儔真道人也德山一日齊晚老子持鉢自方丈下來雪峯云鐘未鳴鼓未響托鉢向什麼處去山低頭遂回巖頭聞云大小德山未會末後句在德山謂汝不肯老僧那巖頭遂密啓其意山次日升座與尋常迥殊巖頭拊掌謂大衆云且喜老漢會末後句雖然如是只得三年此箇公案叢林解會極多然少有的確透得者有以謂真有此句有以謂父子唱和實無此句有以謂此句須密傳授不免只是話會增長機路去本分甚遠所以道醍醐上味為世所珍遇此等人翻成毒藥他參活句不參死句活句下薦得永劫不忘死句下薦得自救不了若要與祖佛為師須明取活句韶陽出一句如利刀剪却臨際亦云吹毛用了急還磨此豈陰界中事亦非世智辨聰所及直是深徹淵源打落從前依他作解明昧逆順以金剛正印印定麾金剛王寶劒用本分手段所以道殺人須是殺人刀活人須是活人劒既殺得人須活得人既活得人須殺得人若只孤單則偏墮也垂手之際却看方便勿使傷鋒犯手著著有出身之路八面玲瓏照破他方與下刃亦須緊密始得稍寬緩即落七落八也只自己等間尚不留毫髮許設有亦斬作三段何況此宗門從上牙爪遇其中人才拈出若投機則共用不投機則剗却以是為要無不了底事切在力行之華藏明首座自錦官夾山鍾阜從余游十餘年其情理勝解悉已拈去入此門來照用機智解路靡不打拼惟向上一著室中百煅千煉比出佐民老以謂違去朝夕欲得筆語因條列數章以付之寄張宣撫相公疇昔受知於此道極深且久豈假言句可通然格外超宗在大達大觀所操持雖千變萬化不出掌握中世法佛法曾無以異唯日用照了鏡心像迹初不遺鑒乃大定也是故維摩取飯香積借座燈王摶妙喜世界如陶家輪納須彌於芥子中吸劫火於腹內由反覆掌蓋中既虗而靈寂而照此外事物出沒轉旋不假他力所謂證不可思議咸即方寸片田地爾矧建功立業蘊德操誠左右逢原秉金剛寶劒拈殺活杖子指揮之際皆此妙也望期之言表意外雖千萬里猶目擊耳又自古聖賢以過量傑出如植大根器獨證此大因緣以悲願力發揮直指萬有同體至淵至奧一段事不立階梯頓超獨得從空劫已前湛然不動印定群靈根腳亘古今絶思慮出聖凡越知見初不動搖淨倮倮活鱍鱍見在一切有情無情莫不圜具是故釋迦初生即指天地大哮吼當頭拈出次以明星末後拈花只貴具此正眼底領略自爾四七二三密傳不知有者以謂有多少妙用神機只言隨波逐流初不究其根本若鞠其至趣不消一劄昔李駙馬見石門門謂曰此大丈夫事非將相所能為李即便領以頌自陳學道須是鐵漢著手心頭便拌直趣無上菩提一切是非莫管蓋上智利根天機已具唯務確實透徹當受用時握大機發大用先機而動絶物而轉巖頭云却物為上逐物為下若論戰也箇箇力在轉處若能於物上轉得疾則一切立在下風並歸自掌握擒縱卷舒悉可點化居常自處泰然安靜不掛纖末於方寸動而應機自秉璣回轉變通得大自在萬彚萬緣皆迎刃而解莫不如破竹勢從風而靡所以立處既真用時有力況總領英雄驅貔虎之士攘巨寇撫萬姓安社稷佐中興之業皆只仗此一著子撥轉上頭關鍵萬世不拔之功與古佛同見同聞同知同用四祖云非心不問佛德山云佛只是箇無事人永嘉云不離當處常湛然覔即知君不可見無位真人常從面門出入皆此蘊也今樞密大丞相已領之於言外透出於聲前而山野剩語忉忉納敗缺猥蒙鈞慈見照以此遂忘老農老圃老馬之智而獻芹焉示圓首座得道之士立處既孤危峭絶不與一法作對行時不動纖塵豈止入林不動草入水不動波蓋中已虗寂外絶照功翛然自得徹證無心雖萬機頓赴豈能撓其神干其慮哉平時只守間間地如癡似兀及至臨事物初不作伎倆準擬剸割風旋電轉靡不當機豈非素有所守也是故古德道如人學射久久方中悟則剎那履踐功夫須資長遠如鵓鳩兒出生下來赤骨𩪸地養來餧去日久時深羽毛既就便解高飛遠舉所以悟明透徹政要調伏只如諸塵境界常流於中窒礙到得底人分上無不虗通全是自家大解脫門終日作為未嘗作為了無欣厭亦無倦怠度盡一切而無能所況生厭墮耶苟性質偏枯尤當增益所不能放教圓通以謳和攝化開權俯仰應接俾高低遠邇略無差誤行常不輕行學忍辱仙人遵先佛軌儀成就三十七品助道法堅固四攝行到大用現前喧寂一致如下水船不勞篙棹混融含攝圓證普賢行願乃世出世間大善知識也古德云三家村裏須自箇叢林蓋無叢林處雖有志之士亦喜自便到恁麼尤宜執守唯在強勉以不倦終之至於喧靜亦復爾喧處周旋應變於中虗寂靜處能不被靜縛則隨所至處皆我活業唯中虗外順有根本者能然大凡為善知識當慈悲柔和善順接物以平等無諍自處彼以惡來及以惡聲名色加我非理相干訕謗毀辱但退步自照於己無歉一切勿與較量亦不動念嗔恨只與直下坐斷如初不聞不見久久魔孽自消爾若與之較則惡聲相反豈有了期又不表顯自己力量與常流何以異切力行之自然無思不服椎拂之下開發人天俾透脫生死豈小因緣應恬和詞色當機接引勘對辨其由來驗其存坐攻其所偏墜奪其所執著直截指示令見佛性到大休大歇安樂之場所謂抽釘拔楔解黏去縛切不可將實法繫綴人令如是住如是執勿受別人移倒此毒藥也令渠喫著一生擔板賺誤豈有利益耶佛祖出興特唱此段大因緣謂之單傳心印不立文子語句接最上機只貴一聞千悟直下承當了修行不求名聞利養唯務透脫生死今既作其兒孫須存它種草看他古來大有道之士動是降龍伏虎神明授戒攻苦食淡大忘人世永謝塵寰三二十年折腳鐺兒煮飯喫遁迹埋名往往坐脫立亡於中一箇半箇諸聖推出建立宗風無不秉高行務報佛恩流通大法始出一言半句出於抑不得已明知是接引入理之門敲門瓦子其體裁力用不妨為後昆模範當宜師法之轉相勉勵追復古風切忌希名苟利茲深祝也馬祖昔歸鄉以簸箕之譏畏難行道因再出峽緣會江西大隋昔歸鄉先於龍懷路口三載茶湯結衆緣遂隱於木菴道行於蜀香林昔歸鄉潛神隱照於水晶宮成四十年一片事撥正智門老祚尋出雪竇大雲門正宗或留再出皆以緣斷今既萬里西歸但存行腳本志亦不必拘去留也慈明昔辭汾陽祝云修造自有人且與佛法為主自爾五據大剎不動一椽唯提振臨際正宗遂得楊岐黃龍翠巖三大士而子孫遍寰海果不辜所付授蓋古人擇可以荷擔之士不輕如此信嚴飾壯麗梵苑未足以奇佛法也佛道懸曠久受勤苦乃可得成祖師門下斷臂立雪腰石舂碓擔麥推車事園作飯開田疇施湯茶般土拽磨皆抗志絶俗自強不息圖成功業者乃能之所謂未有一法從懶墮懈怠中生既以洞達淵源至難至險人所不能達者尚能而於涉世應酬屈節俯仰而謂不能此不為非不能也當稍按下雲頭自警自䇿庶幾方便門寬曠不亦善乎示裕書記住杭州靈隱佛智禪師腳踏實地到安穩處時中無虗棄底工夫綿綿不漏絲毫湛寂凝然佛祖莫知魔外無捉摸是自住無所住大解脫雖歷無窮劫亦只如如地況復諸緣耶安住是中方可建立與人拔楔抽釘亦只令渠無住著去此謂之大事因緣如來有密語迦葉不覆藏迦葉不覆藏乃如來真密語也當不覆藏即密當密即不覆藏此豈可與繫情量立得失存窠臼作解會者舉也要須透脫到實證之地向出格超宗頂𩕳上領始得既已領略應當將護遇上根大器方可印授耶秉拂據位稱宗師若無本分作家手段未免賺誤方來引他入草窠裏打骨董去也若具金剛正眼須灑灑落落唯以本分事接之直饒見與佛齊猶有佛地障在是故從上來行棒行喝一機一境一言一句意在鉤頭只貴獨脫切忌依草附木所謂驅耕夫之牛奪飢人之食若不如是盡是弄泥團漢方來衲子有夙根作工夫驀地得入者不遇真正宗師返引他作露布墮在機境中無繩自縛半前落後似是不是最難整理要須識其病脉辨其落著徵其所偏墜而發起之俾捨執著住滯然後示以本分正宗使無疑惑了然得大解脫居大寶宅自然趂亦不去可以洪濟大法傳續祖燈堪報不報之恩也黃龍老南禪師昔未見石霜會一肚皮禪翠巖憫之勸謁慈明只窮究玄沙語靈雲未徹處應時瓦解冰消遂受印可三十年只以此印拈諸方解路瘥病不假驢駝藥緊要處豈有許多佛法也大宗師為人雖不立窠臼路布久之學徒妄認亦成窠臼路布也益以無窠臼為窠臼無路布作路布也應須及之令盡無令守株待兔認指為月鑒在機先風塵草動亦照其端倪況應酬擾擾哉非𮌎次虗靜無一法當情安能圓應無差先機照物耶此皆那伽在定之效也臨濟金剛王寶劒德山末後句藥嶠一句子祕魔杈俱𦙁指雪峯輥毬禾山打鼓趙州喫茶楊岐栗棘蓬金剛圈皆一致耳契證得直下省力一切佛祖言教無不通達唯在當人善自洪持耳示隆知藏住蘇州虎丘有祖以來唯務單傳直指不喜帶水拖泥打露布列窠窟鈍置人蓋釋迦老子三百餘會對機設教立世垂範大段周遮是故最後省要接最上機雖自迦葉二十八世少示機關多顯理致至於付授之際靡不直面提持如倒剎竿水投針示圓相執赤幡把明鑑說如鐵橛子傳法偈達磨六宗與外道立義天下太平翻轉我天爾狗皆神機迅捷非擬議思量所測洎到梁游魏尤復顯言教外別行單傳心印六代傳衣所指顯著逮曹溪大鑒詳示說通宗通歷涉既久具正眼大解脫宗匠變格通塗俾臣滯名相不墮理性言說放出活卓卓地脫灑自由妙機遂見行棒行喝以言遣言以機奪機以毒攻毒以用破用所以流傳七百餘年枝分派列各擅家風浩浩轟轟莫知紀極鞠其歸著無出直指人心心地既明無絲毫隔礙去勝負彼我是非知見解會透到大休大歇安穩之場豈有二致哉所謂百川異流同歸于海要須是箇向上根器具高識遠見有紹隆佛祖志氣然後能深入閫奧徹底信得及直下把得住始可印證堪為種草捨此切宜寶祕慎詞勿容易放行也五祖老人平生孤峻少許可人乾嚗嚗地壁立只靠此一著常自云如倚一座須彌山豈可落虗弄滑頭謾人把箇沒滋味鐵酸𨃰劈頭拈與學者令咬嚼須到渠桶底子脫喪却如許惡知惡見胸次不掛絲毫透得淨盡始可下手煅煉方禁得拳踢然後示以金剛王寶劒度其果能履踐負荷淨然無一事山是山水是水更應轉向那邊千聖籠羅不住處便契乃祖以來所證傳持正法眼藏及至應用為物仍當驅耕夫之牛奪飢人之食證驗得十成無滲漏即是本分道流也摩竭陀國親行此令少林面壁全提正宗而時流錯認遂向泯默以為無縫罅無摸索壁立萬仞殊不知本分事恣情識摶量便為高見此大病也從上來事本無如是巖頭云只露目前些子箇如擊石火閃電光若明不得不用疑著此是向上人行履處除非知有莫能知之趙州喫茶去祕魔擎杈雪峰輥毬禾山打鼓俱胝一指歸宗拽石玄沙未徹德山棒臨際喝並是透頂透底直截剪斷葛藤大機大用千差萬別會歸一源可以與人解黏去縛若隨語作解即須與本分草料譬如十斛驢乳只以一滴師子乳滴之悉皆迸散要腳跟下傳持相繼綿遠直須不徇人情勿使容易乃端的也末後一句始到牢關誠哉是言透脫死生提持正印全是此箇時節惟是踏著向上關捩子者便諳悉耶法王沖長老從上宗乘高超直證師資契會斷不等間所以二祖立雪斷臂黃梅負舂自餘服勤三十二十載豈容易印可哉蓋觀機逗教百煅千煉才有偏執疑情盡為決破俾徹底放下得平穩履踐轉換到撲不破之地如皮可漏子相似禁當得然後放出接物利生此非小小因緣才一不周即模子不正脫得出來七凹八凸取笑作者是故古德唯務周正八面玲瓏內於己行持潔清如冰玉外則圓通謳和覽群情善回互如陂澤立參之際一一以本分事敲點待其領略即放手段與琢磨譬如一器水傳一器切忌滲漏其間驅耕奪飢神鬼莫測只憑仗一大解脫更不生異類相中頭角妥貼無為真五戒十善出塵阿羅漢也達磨有言行解相應名之曰祖行腳超方本為生死事大接物利生為大善知識止發明大事因緣此相須相資之理自古以然唯堪任荷負大法器乃能於壁立萬仞宗師爐韛鉗鎚中煅煉成就始末真正除是不出一出必驚群動衆定也蓋緣承當處既不莽鹵付授時亦不率易如讓師在曹溪八年馬祖之與觀音德嶠之與龍潭仰山之於大圓臨濟之於斷際皆不下一二十載是故一言一句一機一境金聲玉振後世莫能窺覷惟超證到乎大同之地自然必其落處憶昔馬祖為西堂云子曾看教麼藏云教豈異耶祖云不然子已後為人若東道西說藏云某病須自養豈敢為人祖云子末年必大興於世已而果然細詳古人豈不是大徹大悟向上一段大因緣絶言像離分別硬糾糾處唯己自知獨樂安間休歇去處然馬師尚激勵如此正欲圓通轉變不守一隅泥著一處須該括古今踐履融攝混圓無際貴利物之時八面受敵撥得草窟裏一箇半箇焦尾堪作種草豈非方便作報佛祖恩德事業耶要須打辦精神垂手方便一著著須有出身之機免瞎人眼迷果謬因却不利益此最為知識要徑也黃龍老南大禪師嘗有語端居丈室以本分事接方來人乃長老之職也其餘細事付之知事無不辦者誠哉然用人之際必須慎擇委任令不敗事始得大溈真如云住山無巧只貴善用人思之思之諺語云伎倆不如帳㨾只如百丈大智創立規繩千古撲它底不破今時但謹遵守自己率先不違他雅範則衆人無有不從去也最後折倒衲子透脫死生須知有千聖羅籠不住截斷命根底一著始得古德大有道能擒縱善殺活得大解脫知識無不用之非知之難見於行事當機瞥脫斷得行方始久遠得力也楊岐祖師倡起金剛圈栗棘蓬用辨龍蛇擒虎兕若本色是他家裏人等間拈出便坐斷衲子舌頭也示法濟禪師住泗洲普照勝長老釋迦文多子塔前分半座已密授此印爾後拈花第二重公案至於付金襴雞足山中候彌勒是多少節文也達磨迢迢自西竺游梁歷魏冷坐少林深雪之中有箇斷臂老子解覷破不免漏泄分付伊謂之單傳密記子細推之一場敗闕自此便喧傳西來旨意世間隨流將錯就錯滿地流行分五家七宗遞立門戶提唱就實窮之端的成得什麼邊事是故從上達人不喫這般茶飯且如何却是諦當將知六合外著得眼早自別也況無邊香水海浮幢王剎表下視底乃少知落著實處所以道此大丈夫事撲迭掀豁步驟作略唯同風契證始善弘荷終不摋沙摋土遂與釋迦金色碧眼神光共一坐具地等間垂手殺人活人初無窠臼只貴緊峭萬苦千辛至嶮至毒下得斷命手腳然後不虗印授也白雲師公云神仙祕訣父子不傳示杲書記住杭州徑山臨濟正宗自馬師黃檗闡大機發大用脫籠羅出窠臼虎驟龍馳星飛電激卷舒擒縱皆據本分綿綿的的到風穴興化唱愈高機愈峻西河弄師子霜華奮金剛王非深入閫奧親授印記莫知端倪徒自名邈只益戲論大抵負冲天氣宇格外提持不戰屈人兵殺人不眨眼尚未髣佛其趣向況移星換斗轉天輪回地軸耶是故示三玄三要四料簡四賓主金剛王寶劒踞地師子一喝不作一喝用探竿影草一喝分賓主照用一時行許多絡索多少學家摶量注解殊不知我王庫中無如是刀及弄將出來看底只是眨眼須是他上流契證驗認正按旁提還本分種草豈假梯媒只如寶壽開堂三聖推出一僧壽便打聖云你與麼為人非但瞎却這僧瞎却鎮州一城人眼去在壽擲下拄杖便歸方丈興化見同參來便喝僧亦喝化又喝僧復喝化云你看這瞎漢直打出法堂侍僧問這僧有何相觸誤化云是他也有權有實我將手向伊面前橫兩遭却不會似此瞎漢不打更待何時看他本色宗風迥然超絶不貴作略只羡他眼正要扶荷正宗提持宗眼須是透頂透底徹骨徹髓不涉廉纖迥然獨脫然後的的相承可以起此大法幢然此大法炬也繼馬祖百丈首山楊岐不為叨竊耳示報寧靜長老靈山單傳少室密付要卓卓絶類離倫驗風塵草動眼光睒睒逐青去上隔山已識起倒吞聲削迹不留毫末而能鼓逆水波運截流機上門上戶咬人火急如俊鷹快迷影捎空背摩青霄眨眼便過點著便來挨著便去不妨峭淨所以流此正宗標準異世也箇箇須是殺人不眨眼然後入作只如黃檗老漢生知此段才行腳天台見羅漢凌波絶瀑流即欲打殺及抵百丈聞舉馬師一喝三日耳聾乃退身吐舌知是大機之用豈單見淺聞所擬議或其後接臨濟祖師全體用此不惜眉毛成就克家之子覆蔭天下人有志之士應飽諳熟練使越格超宗然後所以奪飢人食驅耕夫牛紹繼先規不迷向背細處直是涓滴照透寬廣時千聖亦尋他不著始是向上種草祖峰老師常云釋迦彌勒猶是他奴至竟他是阿誰那容向此亂下針錐除非知有則較些子也大凡奮丈夫氣槩要超軼上流合下手便教羅籠不得呼喚不回利物應機莫非灑灑落落不向草窠裏輥鬼窟裏弄情魂將玄妙理性揚眉瞬目舉手動腳下合頭語以實法繫綴人家男女一盲引衆盲成何方便既已據位稱師固不可容易只自己分上滴水滴凍孤迥危峭如師子兒遨遊意氣驚群出沒縱擒卒難測度驀然踞地返擲百獸奔馳喪膽豈非殊勝奇特耶還是與麼人三千里外已審端倪了也是故巖頭道如水上按葫蘆子相似等間蕩蕩地拘牽惹絆不得觸著捺著則蓋天蓋地長養履踐得到此地始可與靈山少室分一線路黃蘗臨濟巖頭雪峰互為賓主風行草偃亦不虗出頭播揚三十二十年他家自有同流共證明通人相將護也誰言卞璧無人鑒我道驪珠到處晶示開聖隆長老開聖堂頭隆老政和中相從於湘西道林膠漆相投箭鋒相直由是深器之既而復相聚於鍾阜大爐鞴中禁得鉗鎚了此段因緣日近日親向從上來乃佛乃祖越格超宗萬千人羅籠不住處毛頭針竅間廓徹虗通包容百千萬億無邊香水剎海拄杖點發列聖命脉吹毛刃上截斷路布據曲彔木床與人楔抽釘解黏去縛得大自在仍來夷門分座共相扶立久之況箇一著臨濟正法眼藏綿綿到慈明楊岐須風吹不入水灑不著底刢利漢負殺人不眨眼氣槩高提正印罵祖呵佛猶是餘事直令盡大地人通頂透底絶死生窠窟灑灑落落到無為無事大達之場乃為種草示普賢文長老佛祖以心傳心蓋彼彼頴悟透脫如兩鏡相照非言象所拘高超格量箭鋒相拄初無異緣乃受道妙嗣祖繼燈絶意路出思惟脫情識到蕩蕩然寬通自在處逗到擇人付囑亦要氣異羽毛頭角體裁全具然後不墜家聲得從上爪牙方相應副所以數百年紹續愈久愈光顯所謂源流深長也今則頗失故步多擅家風存窠窟作路布自既不出徹轉以為人則如老鼠入牛角漸漸尖小安得宏綱不委于地哉老漢昔初見老師吐呈所得皆眼裏耳裏機鋒語句上悉是佛法心性玄妙只被此老子舉乾曝嚗兩句云有句無句如藤倚樹初則擺撼用伎倆次則立諭說道理後乃無所不至拈出悉皆約下遂不覺泣下然終莫能入得再四懇提耳乃垂示云你但盡你見解作計較待一時蕩盡自然省也隨後云我早為你說了也去去向衣單下體究了無縫罅因入室信口胡道乃責云你胡道作麼即心服真明眼人透見我𮌎中事然竟未入得尋下山越二載回始於頻呼小玉元無事處桶底子脫才始覷見前時所示真藥石也自是迷時透不得將知真實諦當處如良遂道諸人知處良遂總知良遂知處諸人不知誠哉是言也雪峰問德山從上宗乘中事學人還有分也無德山以杖擊之云你道什麼峰云我在德山棒下似脫却千重萬重貼肉汗衫臨濟被黃檗三擊之到大愚問有過無過愚云黃檗與麼老婆你更來覔過在濟猛省不覺云元來黃檗佛法無多子此二老皆叢林傑出者並於棒下發明後來大振此宗為世梯航學者宜回思之豈是粗淺邪而近世有謂以杖接人皆墮機境直須究了心性談極玄妙向時中綿綿密密有針有線方可入細只如一大藏教五教三宗析微發隱剖露至真實際徹佛地理性豈不為細何假祖師西來將知法流既久多生異見不得真傳乃將醍醐而作毒藥豈德山雪峰黃檗臨濟之咎哉諺曰索短不到深泉魯祖見僧只面壁南泉云我有時向道直須向父母未生已前究取尚不得一箇半箇他恁麼驢年去二老並躅齊眉不是不知有因甚却恁麼地說話還究到魯祖節文處麼若究到則見南泉如水入水若不諳此乃分疏魯祖僻執南泉圓轉隨他語脉路布卒摸索不著在石鞏彎弓發箭祕魔擎杈驗人俱胝只豎一指無業唯言莫妄想禾山打鼓雪峰輥毬趙州喫茶玄沙蹉過佛法豈有如許耶若一一作方便下合頭語便論劫千生也未夢見在若真實踏著曹溪正路則坐觀成敗覷見這一隊漏逗也子文監寺留此軸今數年矣近退院稍間因為出此所有蓋天蓋地絶出聖賢一著子公久參自如良遂知之矣建炎三年閏八月十一日雲居東堂書示鼎州德山靜長老長老道林相從乃宿昔有大緣撥轉上頭關一語便契圓照無遺從上來莫不皆以是大機大用龍象蹴踏非驢所堪若不具此手段云何與人解黏去縛抽釘拔楔此本分事也但只一向操持驅耕奪飢乃活句也一切語言機要事理明暗語默擒縱殺活皆在下文不消一揑唯黃檗臨濟睦州雲門溈仰雪峰玄沙尤得妙也山僧室中不曾踏著此關斷定不放過付授之際尤在牢實切忌依稀便骨董也寧可無人承當有則須是箇中人始得示潭州智度覺長老至道簡易而淵奧初不立階梯壁立萬仞謂之本分草料是故摩竭掩室行正令毗耶杜詞揭本宗尚有作家漢未放過何況涉妙窮玄說心論性被貼肉汗衫子黏著脫拆不下則轉見郎當爾少室曹溪風範迥殊臨濟德山作略剔脫龍馳虎驟地轉天旋不妨慶快人了不拖泥水從上來大達大悟才信徹極致處即如快鷹俊迷風曜日背摩青霄直下透脫使二六時中無纖毫障隔八達七通卷舒擒縱聖位尚不居豈肯處凡流𮌎次蕩然該今括古拈一莖草作丈六金身拈丈六金身作一莖草初無勝劣取舍惟在當機活卓卓地有時奪人不奪境有時奪境不奪人有時人境俱奪俱不奪出格超宗十成蕭灑豈是只貴籠人蓋覆移換走作人要當撲實頭顯示無依倚無為無事大解脫各各本分事所以古人風塵草動便先照了才出毫芒即與剗斷尚不得一半豈可彼此草裏輥相牽相拽機關語句上論量揀擇作窠臼埋沒人家男女軒知是開眼尿牀他明眼人終不做箇般路布大丈夫意氣驚群須圖正紹臨際本宗一喝一棒一機一境當陽勦絶豈不見道吹毛用了急還磨示蜀中鷲峰長老多子塔前曾分半座葱嶺西畔隻履獨𢹂臨濟以瞎驢命惠然夾嶠因青山委洛浦雖源分派別要一脉出自曹溪擇大器利根俾掃蹤滅跡是故從上來龍馳虎驟換斗移星閃電中別殽訛石火裏分皂白不論瞢底惟務俊流懸肘後符廓頂門眼立起綱宗單提正令源不深則流不長功不積則用不妙是以西河弄師子要超宗越格而楊岐吞栗棘蓬取奔流度刃既入箇選佛場闡向上關捩子應須一滴水一滴凍硬著鐵脊梁荷擔此大任己躬下諦實為人處無偏才落世緣便涉漏逗祖峰老師橫點頭白雲祖翁渾圝吞棗常為警䇿如臨深履薄便可以向百尺竿頭進千百步懸崖上跳萬億遭乃真皮可漏方驗撲不破蓋大雄的的種草也慎之示顯上人住蘇州崑山惠嚴見處通透用處明白當旋機電卷結角羅紋槃錯縱橫自能回轉無凝滯亦不立見亦不存機滔滔地風行草偃蓋根腳悟入時徹淵源修證得無回互會尚不可得豈況不會二六時中只恁無繫無絆初不存能所我人何有於佛法哉此無心無為無事境界豈世間聰明利智辨慧多聞無根本人能測量耶達磨西來豈將得此法來他惟直指各各當人本有之性令出徹明淨不為如許惡知惡覺妄想計較所染污參須實參得真正道師不引入草窠裏直截契證脫却貼肉汗衫子令𮌎次虗豁無一毫凡情聖量亦不向外馳求湛然真實千聖莫能排遣得一片淨倮倮田地透出空劫那邊威音王猶是兒孫何況更從他覔有祖以來作家漢莫不如是且如六祖新州一鬻薪人目不體字逗至於大滿相見一面披襟著著透脫雖則聖賢混迹要以方便顯示此段不隔賢愚皆已本有今既廁跡禪流日逐冥心體究知此大緣不從人得只在猛利擔荷增進日損日益如精金百煉千煅出塵之要利生之本尤須七穿八穴到無疑安穩得大機大用之處此工夫正在密作用中只日於萬緣交參紅塵擾攘順違得失摐然羅列於中出沒不被他所轉能轉於他活鱍鱍地水灑不著乃是自己力量至於靜默虗凝亦非兩種乃至奇言妙句險機絶境亦只一槩平之了無得失皆為我用似此磨琢久之生死之際脫然視世間間名破利如風過游塵夢幻空花耳翛然度世豈非出塵大阿羅漢耶骨銼和尚一生有問只以骨銼也酬之如鐵彈子不妨緊峭若善體究真祖師門下師子兒忠國師問本淨禪師汝見一切奇言妙句時如何淨云無一念心愛國師云是汝屋裏事參學到此乃是淨潔乾嚗嚗地不受人瞞者只山僧恁麼道也合與本分卓料示諫長老住蜀中無為山趙州云我在南方三十年除粥飯二時是雜用心處將知古德為此箇事不將作等間直是鄭重所以操修覷捕到徹底分明於一機一境一句一言悉不落虗是故世法佛法打成一片今時要湊泊著實須是猛利奮發倒腸換肚莫取惡知惡見莫雜毒食一味純正真淨妙明直下踏著本地風光到安穩大解脫之地坐斷報化佛頭凜凜孤危風吹不入水灑不著正體現成日用有力量聞聲見色不生取舍著著有出身之路豈不見僧問九峰見說和尚親見延壽是否峰云山前麥熟也未識得渠親切近處便見衲僧巴鼻所謂殺人刀活人劒但請長時自著眼看到出格時自然知落處也示元禪客住成都府廣孝趙州道佛之一字吾不喜聞且道他為甚如此莫是佛為一切智人渠不喜聞耶軒知不是這箇道理既不如此何以不喜聞之若是明眼人聊聞便知落處請問落在什麼處試吐露看魯祖見僧來便面壁是為人不為人節文在什麼處若要與他投機作何趣向即得百丈大智每上堂說法竟復召大衆衆回首丈云是什麼藥山自云百丈下堂句且道用接何人如何領覽示杲禪人住杭州徑山杲衲子根性猛利負笈海上遍訪宗匠受知於舊相無盡公深器重之負俊邁之氣不肯碌碌小了標誠相從一言投機頓脫向來羈鞅雖未倒底領略要是昂藏不受人抑勒快漢原其所自蓋由傅公殿撰發渠本因遂冒嚴凝暫之咸平來告行且乞法語豫因示之衲子當痛以死生為事務消知見解礙徹證佛祖所傳付大因緣勿好名聞退步就實俟行解道德充實愈潛遁而愈不可匿諸聖天龍將推出人爾況以歲月淹練琢磨待如鐘在扣如谷應聲如精金出萬煅爐冶萬世不易萬年一念向上巴鼻在掌握中草偃風行豈不綽綽然有餘裕哉仍持此紙似傅翁相與作證履踐貴長久不變耶示蘊初監寺住蘇州明因只道與你說一句子早是著惡水潑人何況更瞬目揚眉敲床豎拂是什麼下喝行棒軒知是平地上骨堆更有不識好惡底問佛問法問禪問道請相為乞相接求向上向下佛法知見語句道理是乃泥裏洗土土裏洗泥幾時得脫灑去有般底聞與麼道便作計較云我會也佛法本來無事人人無不具足終日喫飯著衣何曾缺少來便向無事平常界裏打住殊不知豈有恁麼事來故知須是本分其中人方諳從上宗乘本分若實有悟入處識起倒知進退別休咎離滲漏日近日親轉更豹變不守窟宅跳出圈圚不疑天下老漢舌頭一似生鐵鑄就正好著力修行供養然後可以然無盡燈行無間道舍身舍命撈摝群生令他各出樊籠去執縛佛病祖病俱瘥解脫深坑已出作箇無為無事快活道人去然自既得度須不廢行願思度一切忍苦捍勞向薩婆若海為舟為航始有少分相應慎勿做骨羸錐露柱燈籠打淨潔毬子自了得濟甚事是故古德須勉人行箇一條路堪報不報之恩如今諸方多有靈利衲子要直透得徹有底探頭太過要易會才知些趣向便欲出頭又是一等蹉過有推而不出亦未圓通知時節因緣而不失機會乃通方之士也示一書記住四明雪竇英靈衲子蘊卓識奇姿慷慨隳冠視身世浮名如游塵浮雲谷響以宿昔大根器知有此段超生出死絶聖越凡乃三世如來所證金剛正體歷代祖師單傳妙心跂步蹴踏作香象金翅要馳驟飛騰於億千萬類之上截流摩霄豈肯為鴻鵠燕局促於高低勝負較目前電光石火間被轉利害耶是故古之大達不記細故不圖淺近發志便欲高超佛祖荷擔一切所不能承當重任普津濟四生九類拔苦與安破障道愚昧折無明顛狂毒箭拈出法眼見刺使本地風光澄霽空劫已前面目明顯悉心竭力不憚寒暑刻意尚行向三條椽下死却心猿殺却意馬直使如枯木朽株相似驀地穿透豈從他得發覆藏然暗室明燈擬䑯航於津要證大解脫不起一念頓成正覺且通箇入理之門然後升普光明場踞無漏清淨殊勝偉特法空之座口海瀾翻奮無礙四辨才立一機垂一句現一勝相普使凡聖有情無情俱仰威光受庇庥尚未是絶功勳處更轉那頭千聖羅籠不住萬靈景仰無門諸天無路捧花魔外那能旁覷放却知見卸却玄妙揚却作用惟飢餐渴飲而已初不知有心無心得念失念何況更戀著從前學解玄妙理性分劑名相桎梏知見佛見法見動地掀天世智辨聰自纏自縛入海算沙有何所靠耶等是大丈夫應務敵勝驚群滿自己本志願乃為本分大心大見大解脫無為無事真道人也跋一書記法語豫政和末抵琅邪會一師若故舊喜其志道不群因作前偈及應詔大梁遂得游從日以此段咨扣益勤數百衆中乃肯斆力復示以後語建炎元祀將之東南因為重書而復系之以跋為他日再會之識且以相分雖道人本分相知千萬里外不隔毫末而古者多於此時節行正令趙州云有佛處不得住無佛處急走過石室云莫一向去已後却來我邊洞山萬里無寸草大慈帶取老僧去歸宗時寒途中善為曹山去亦不變異悟本飛猿嶺峻好看皆直截不覆藏唯務百川明宗當陽領略則南州北縣何處不逢渠末後殷勤未免重拈一遍且作麼生是諦當處楖𣗖撗擔不顧人直入千峰萬峰去示宗覺禪人宗門接利根上智提持出生死絶知見離言說越聖凡道妙豈淺識小見理道機境解路上作活計者所能擬議要須如龍似虎殺人不眨眼漢用瞥脫快利力量聊聞舉著剔起便行外棄世間縛著內捨聖凡情量直得孤迥迥峭巍巍不依倚絲毫當陽薦透全身擔荷佛來也炫惑不動況祖師宗匠語句機鋒一刀截斷更不顧藉自餘諸雜甚譬如間方可攀上流少分相應也不見永嘉才跨曹溪便師子吼丹霞聞馬師示選佛場當下決破逗到二師之前逆流投契亮坐主四十二本經論言下冰消德山吹紙燭便燒疏鈔臨濟六十棒後乃翻擲並皆透脫不知曾入室幾回請益幾次近時學道之士不道他不用工夫多只是記憶公案論量古今持擇言句打葛藤學路布幾時得休歇如斯只贏得一場骨董推源窮本蓋上梢不遇作家自己不負大丈夫志氣曾不退步就己打辦精神放下從前已後勝妙知見直截獨脫領取本分大事因緣是故半前落後不分不曉若只恁麼縱一生勤苦亦未夢見在是故昔人云菩提離言說從來無得人德山道我宗無語句亦無一法與人趙州道佛之一字吾不喜聞看他早是摋土塗糊人了也若更於棒頭求玄喝下覔妙瞪眉努眼舉手動足展轉落野狐窠窟去也此宗惟貴悟明到銀山鐵壁萬仞孤峭擊石火閃電光擬不擬便墮坑落穽所以從上護惜箇一著子同到同證無你撮摸處既能辦心能舍緣纍修行依知識若更不耐心向千難萬難不可湊泊處放下身心體究教徹底誠為可惜只如千生百劫到今還有間斷也無既無間斷疑箇甚生死去來軒知屬緣於本分事了無交涉五祖老師常說我在此五十年見却千千萬萬禪和到禪床角頭只是覔佛做說佛法並不曾見箇本分衲子誠哉看却今時只說佛法底也難得何況更求本分人時節澆季去聖愈遠大唐國裏胡種看看滅也或得一箇半箇有操持不敢望似已前龍象但只知履踐趣向頭正尾正早是火中出蓮切宜撥退諸緣便能識破古來大達大悟底蘊隨處休歇行密行諸天無路捧花魔外覔行蹤不見是真出家了徹自己如有福報因緣出來垂一隻手亦不為分外但辦肯心必不相賺只老僧恁麼也是普州人送賊示光禪人欲得親切第一不用求求而得之已落解會況此大寶藏亘古亘今歷歷虗明從無始劫來為自己根本舉動施為全承他力唯是休歇到一念不生處則便透脫不墮情塵不居意想迥然超絶則遍界不藏物物頭頭渾成大用一一皆從自己𮌎襟流出古人謂之運出家財一得永得受用豈有窮極耶但患體究處根腳不牢不能徹證直須猛截諸緣令無纖毫依倚放身捨命直下承當無第二箇縱使千聖出來亦不移易隨時任運喫飯著衣長養聖胎不存知解可不是省要徑截殊勝法門耶示民禪人先聖一麻一麥古德攻苦食淡潔志於此廢寢忘餐體究專確要求實證豈計所謂四事豐饒者哉及至道不及古便有法輪未轉食輪先轉之議由是叢林呼長老為粥飯頭得非與古一倍相返耶然隨緣變異門且行第二段北山延接方來道人惟仰南畒今秋適會大稔請覺民禪客覷收刈臨行乞言因示以前段因緣貴崇本及末乃為兼利並照圜悟通達之人本分事也勉行之乃善大凡學道探玄須以大信根深信此事不在言語文字一切萬境之上確實惟於自己根腳放下從前作知作解狂妄之心直令絲毫不掛念向本淨無垢寂滅圓妙本性之中徹底承當能所雙忘言思路絶廓然明見本來面目使一得永得堅固不動然後換步移身出言吐氣並不落陰魔境界則一切佛法端坐現前遂契行坐皆禪脫去生死根本永離一切蓋纏成箇灑灑無事道人何須向紙上尋他死語百草頭上有祖師夾山指出令人薦寬平田中有大義百丈展手要人知若能顆粒圓成即是單傳心印更或彌望但然使證第一聖諦且出草一句作麼生道滿船明月載將歸示才禪人俱胝見僧及答問惟豎一指蓋通上徹下契證無疑瘥病不假驢駝藥也後人不諳來脉隨例豎箇指頭漫不分皂白大似將醍醐作毒藥良可憐愍若是真的見透底始知鄭重終不作等間所謂千鈞之弩不為鼷鼠發機是故須具頂𩕳上眼方可入作後來玄沙拈曰俱胝承當處莽鹵只認得一機一境有般拍盲底隨語作解便抑屈俱胝以謂實然殊不知焦磚打著連底凍到這裏直須子細切忌顢頇只俱胝臨化去自言我得天龍一指頭禪一生用不盡豈徒然哉曹溪大鑑微時乃新州鬻樵人也碌碌數十年一旦聞客誦經發其本願棄母出鄉遠謁黃梅才見數語間投機隱迹碓坊八箇月暨與秀師呈偈始露鋒鋩黃梅尋舉衣盂授之是時群衆趂逐競欲奪取而蒙山先及於庚嶺舉之不勝方悟非可以力爭稽首乞發藥大鑒示以不思善惡處本來面目即便知歸以時未至復遁於四會獵人中久之然後出番禺吐風幡心動之語印宗伸師禮為之落髮登具即開大法要董二千衆聲徹九重命貴近降紫泥確然不應度龍象數十人皆大宗師何其韙哉雖聖賢應世存亡進退舉照無遺然步驟趣向從微至著考之不斷世緣而示妙規百世之下無與為等到今遍寰海皆其子孫每仰洪範輒欲擬其毫末亦不可得欲望後進有力量者勉之聊述梗槩耳現定見聞覺知是法法離見聞覺知若著見聞覺知即是見聞覺知非達法也大凡達法之士超出見聞覺知受用見聞覺知不住見聞覺知直下透脫渾是本法此法非有非無非語非默而能現有現無現語現默長時亘然不變不異是故雲門云不可說時便有不說時便無去也思量時便有不思量時便無去也直須妙達此法令得大用長時語默縱橫悉令般若現前何必更論在善知識身邊為親在田野間作為是疏一往直前自然觸處逢渠也乃佛乃祖仰重此一端的事布在群機之中高低貴賤未嘗向背百種千頭作為天真歷落圓陀陀地若特地作佛法玄妙見則虧儻能不起見只麼淨倮倮却全彰所以道入林不動草入水不動波山是山水是水僧是僧俗是俗見拄杖子只喚作拄杖子謂之覿體若向箇裏覷得透從朝至暮從暮至朝無絲毫透漏全為我用一一非分外渾是本分事腳跟下未得諦當亦不移易絲毫許豈非端的現成機要耶直截省要只消箇現成公案浩浩作為自晝及夜縱橫十字喧靜語默全體運用一時覷破從頭與批判將去不妨快哉此事若在言語裏則合一句語便殺定更不移改也云何千句萬句終無窮竭將知不在言語裏要假語句以顯發此事靈利漢當須直體此意超證透語句底使活鱍鱍地便能將一句作百千句用將百千句作一句用也更疑甚麼即心即佛非心非佛不是心不是佛亦不是物以至心不是佛智不是道東山水上行日午打三更後園驢喫草北斗裏藏身一串穿却嚴陽尊者問趙州一物不將來時如何州云放下著進云某甲一物不將來未審教放下箇什麼州云看汝放不下言下大悟後來黃龍頌一物不將來兩肩擔不起明眼人難謾言下忽知非退步墮深坑心中無限喜如貧得寶毒惡既忘懷沒交涉蛇虎為知己異類等解寥寥千百年清風猶未已放下著若以常情論之他道一物不將來云何却向道放下著將知法眼照於細微為他拈出大病令他知羞慚去他尚不覺更復進問再與點過直得瓦解冰消方始倒底一時脫去遂至伏猛虎馴毒蛇豈非內感外應耶龐居士渾家向火居士驀云難難十石油麻樹上攤龐婆云易易百草頭上祖師意靈照云也不難也不易飢來喫飯困來睡尋常舉向人多是愛靈照道得省力嫌龐翁龐婆說難說易只是作隨語解殊不本其宗猷所以言迹之興異途之所由生也若能忘言體意方見此三人各出一手共提箇沒底藍兒撈蝦摝蜆著著有殺人之機處處有出身之路示璨上人達磨西來不立文字語句唯直指人心若論直指只人人本有無明殼子裏全體應現與從上諸聖不移易絲毫許所謂天真自性本淨明妙含吐十虗獨脫根塵一片田地惟離念絶情迥超常格大根大智以本分力量直下就自根腳下承當如萬仞懸崖撒手放身更無顧藉教知見解礙倒底脫去似大死人已絶氣息到本地上大休大歇口鼻眼耳初不相知識見情想皆不相到然後向死火寒灰上頭頭上明枯木朽株間物物斯照乃契合孤迥迥峭巍巍更不須覔心覔佛築著磕著元非外得古來悟達百種千端只這便是是心不必更求心是佛何勞更覔佛儻於言句上作路布境物上生解會則墮在骨董袋中卒撈摸不著此忘懷絶照真諦境界也荒田不揀信手拈來明明百草頭明明祖師意何況青青翠竹黃花墻壁瓦礫以無情說法水鳥樹林演苦空無我是由依一實際發無緣慈於寂滅大寶光顯無作勝妙力長慶云撞著道伴交肩過一生參學事畢南塔云我拈片木葉入城便是移一坐仰山去也故香嚴擊竹靈雲見桃花資福剎竿頭道吾神杖子大仰插鍬地藏種田無非發揚箇金剛正體使當人不動步參見大解脫真善知識行不言化得無礙辨則森羅萬象百草顛頭長時遍參無不普攝圓融法界坐斷報化佛頭坐臥行藏超證遍行三昧何必覺城東際樓閣門前熊耳曹源升堂入室然後為親近傳證耶惠超咨和尚如何是佛法眼云汝是惠超超乃省悟所謂出乎爾者反乎爾者也唐朝古德英禪師微時事田運槌擊塊次見一大土塊戲以槌猛擊之應時粉碎驀地大悟自此散誕為不測人頗彰神異有老宿拈云山河大地被這僧一擊百雜碎獻佛不假香多誠哉是言
