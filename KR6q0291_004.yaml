body:
  text: 嗣法子文編示月禪人昔曹山別悟本問向甚處去山云不變異處去本云不變異處豈有去耶山云去亦不變異悟本領之蓋其透得綿密無間隔得大安穩無所不通是故機路灑落千人萬人籠羅不住至於發言直截了無凝滯若胸次稍有解會隨處執著則豈能句下便恁剪斷善體此意真不變異雖千生萬劫亦只如如頭緒紛然一一當陽皆無變異豈非得如空際大定耶所以道妙體本來無處所通身那更有縱由則去亦不變異之旨明矣釋迦老子道我今為汝保任此事終不虗也將知徹佛知見淵源無不皆實履踐到實處凡所舉止悉不落虗一一透頂透底邁古超今求其形相毫末了不可得極其諦當則喫飯著衣四威儀中全體成現要須保任鄭重如獲至寶將護長養便得大力量以之度世利物靡所不堪方為佛子不辜釋迦老子苦口謂之知恩報恩也示本禪人常獨行常獨步達者同遊涅槃路此蓋不與萬法為侶之大旨也況自己本有根腳生育聖凡含吐十虗無一法不承他力無一事不從他出豈有外物為障為隔但恐自信不及便把不住去若洞明透脫只一心不生何處更有如許多所以道靈光獨耀迥脫根塵要須直下承當從本以來自有底活卓卓妙體然後於一切時一切處無不逢渠無不融攝喫飯著衣凡百作為世出世間皆非外得既達此矣只守平常不生諸見説什麼一口吸盡西江水設使百千諸佛無量祖師顯現無邊怪異神變不消一劄但恁麼信及見徹行腳事豈不辦耶示達禪人大道正體不在混沌未分及杳冥恍惚處亦不是故作深邃隱蔽令人不可窮不可測量蓋至明非明至妙非妙直下簡易若是宿根純靜聊聞舉著便知落處更不向外馳求向根腳下千了百當全體現成乃至觸境遇緣悉皆透頂透底坐得斷把得住作得主終不取他人舌頭路布及古今言教機境公案將為極則是故從上作家唯只提持此段要人自承當擔荷豈曾更立階梯地位漸次如之若彼來今時兄弟不道他全不用心要是不得省力具大根大器大機大用一聞千悟徹骨徹髓痛領將去才一蹉却毫髮便入解會理路言詮意識根塵中去所以脫他藥網不出未免漠漠懷疑便更下鈍工十年五載終莫能果決尋常每勸兄弟須奮猛利心棄却從前學路得失窠臼似向萬仞懸崖撒手拌捨性命從他氣息一點也無如大死底人餉間蘇醒起來謾你不得也却為已到腳踏實地處寬若太虗明如杲日更不消造化一切自圓成二六時中與千聖交參俱為殊勝奇特脫灑信口開信腳行更疑箇甚豈不見古宿指人道由悟達法離見聞若也真的悟去更憂甚佛不解語切須向日用中不起異見放教𮌎中灑灑落落打辦精神自覷見久之須有信入處若只守間閉眉合眼要參露柱燈籠也須知有佛種性底終不向死水裏折倒但辦肯心必不相賺菩提離言説從來無得人具摩醯正眼靈利衲子聊聞舉著即便覷透終不作限量墮在解脫深坑中有般底容有路布即謂離言説真言説無得人乃實證之人當面蹉却被葛藤纏倒終不明得從上來事是故此宗雖務冥契密付既作諸佛苗裔應須紹續門風明全提正印深機脫生死塵勞惡作執縛永嘉乃云大丈夫秉慧劒般若鋒兮金剛焰豈容擬議於其間哉生死為大事真透脫去不以為大何故以無怖畏諦了實證如如不動視萬有起滅中外根株洞然明白始末齊平初無得喪而常執此大明普照若揭日月而行如師子王遊戲自在促百千劫為一念衍一念為百千劫須彌納芥子中大千擲方外皆我心常分何有淨穢去來為罣礙生死得喪為繄纍哉古德云生也猶如著衫死也還同脫袴不以生死為大變可知矣示印禪人參問之要當人不論曉夕以為事長令念茲在茲自覷捕驀然絶情識忘思量一旦桶底子脫心上更不見心佛上豈假作佛得大休歇場虗間寂靜無相無為無執無住祖師言教更不明別事所謂了得身心本性空斯人與佛何殊別但自體究終有箇入處却來證據乃是了事人也子細看之初機晚學乍爾要參無捫摸處先德垂慈令看古人公案蓋設法繫住其狂思橫計令沉識慮到專一之地驀然發明心非外得向來公案乃敲門瓦子矣只如龐居士問馬大師不與萬法為侶底是什麼人馬云待汝一口吸盡西江水即向汝道但靜默沉審然後舉看攸久之間須知落處去若以語言詮注語言只益多知無緣入得此箇法門解脫境界諦信諦信以悟為則勿嫌遲晚疾苦在身宜善攝心不為外境所搖中心亦不起念常以生死事大無常迅速為意不可斯須恣縱唯嗔一法於三業為大過患儻有順違切勿令生常虗己正心觀外來觸如虗舟飄瓦則物我俱寂到不動地爾思之諦思之示妙覺大師學道先於擇師既得真正具頂門眼善知識依其決擇死生大事須猛勇放下身心忘情體究當資悟入發明從本以來獨脫無滯礙本分事日損日日損履踐到無疑至實大休歇之場此所謂具眼參學有勝負存窠臼雖一往超勝不知有不存誠不學道不求出離者然於此宗未得深造猶在半塗亦為可憫大凡出家離俗要洪聖道度一切人而無度人得道之迹方可超詣向上人行履處且向上人肯自謂會佛法能證妙果越佛超祖不酌然的無是理蓋只覔箇毫髮許能所解悟證入亦了不可得豈況熾然生見刺耶是故古德道他得底人只守間間王老師只要癡鈍去豈不見渠每每埀示三世諸佛不知有狸奴白牯却知有直饒得渾脫狸奴白牯去也未合向裏存坐在要須恁麼恁麼更恁麼撒手向那邊去始得夾山道任你碧潭清似鏡終教明月下來難將知才及不盡並是影響棒打石人頭曝嚗論實事去究竟看著衣喫飯雖不是別人且要脫貼肉汗衫子不得即留滯也既脫却貼肉衫子管取是一員無為無事出塵得度大道之人耶示仁書記雪峰為人如金翅鳥擘海直取龍吞豈唯雪峰從上大有道之士蘊兼利並照老作家手段者莫不皆然蓋不直截不盡力如銀山鐵壁峭則鈍置去是故臨濟德山行棒行喝下毒手腳正欲大心大器大根者向上承當應不令人只認目前光影口頭聲色也所以道向上一路千聖不傳若是箇漢聊聞舉著便透徹去終不守他窠臼取他死語也且行棒行喝落在什麼處若不明得直取龍吞意則又紛紛紜紜去也大丈夫漢己靈猶不重何況取他人路布為自己胸襟直須不受人瞞昂藏特立截却從來依倚擺撥理性玄妙動用作略體本分事既體得到本分處只曲肱而枕亦是箇大快活人若不了泯然冥然迢然恁麼去才回頭覷捕有纖毫疑間則沒關涉也豈不見臨濟道元來黃蘗佛法無多子參答怡然道人宿承光賁小參以此道為懷況利根上智廓然自得以極清淨本源而能玲瓏照了徹透鑒覺不出戶庭已驗過諸方而老僧淺陋乃沐知照許令擊揚既同風密契因不自踈外於此事盡底裏羅列一句一言一機一境皆絶唱之深致也非心性玄妙語默關涉葛藤路布直是透頂透底蓋色騎聲坐斷報化佛頭不落是非得失唯徹根源清淨正眼雖思念寂滅明惠脫去籠羅超然獨證頂𩕳上一著此時豈有纖毫道理亦不立空劫已前威音已後到箇裏諸天捧花無路外道潛覷不見淨倮倮赤灑灑乃本地風光本來面目直得佛覷不見謂之向上一路千聖不傳除非其中人則一舉便知落處矣答黃通判承別紙踐履是誠有意於實諦不徒資談柄之浮根尚口語之淺學矣況此段大緣人人根本洞然融通包括群有不滅不生亘今亘古常在日用之中而以無始妄習翳障強作知解不能獨脫爾明公今既息心絶力體究離諸妄緣了如如性要見諸相非相若確然專一下些攸久工夫定須有所契證如佛所謂若見諸相非相即見如來此直諸相當體了不可得全是自心及為非相則於如如而來如如而去無二無別脫體全真契妙明真心本來清淨只自己本來面目是也固非使人撥諸相為非相向外馳求也然此心本來澄湛物我一如境之與心初無兩種要心冥境寂然後有所證入及至證入之後證亦非證入亦非入翛然通透如桶底子脫始契無生無為間間妙道正體今作息念澄慮工夫乃是入道門徑但辦此心當有深證爾古德道若不安禪息定到這裏總須茫然去逗至透得到徹頭處玄亦不立佛祖亦不立乃向上大機大用其中人行履處又且更須知有始得此事不在言句中雲門云若在言句中一大藏教豈是無言何假祖師西來將知祖師之來唯論直指人心不立文字語句但忘懷體究令澄湛綿密到一念不生脫却向來知解作略機境計較道理忘心直證然後於日用之中以此正印印定一切諸相則非異相則築著磕著無非真淨明妙大解脫境界也然既了此却依尋常諸佛諸祖所垂示正因正果將世間雜染害道諸不善業脫然打拼怗怗地修行念茲在茲三十二十年枯淡此心此身即成就堅固法身也切恐撥無因果作豁達空作無礙見解此毒刺也切望體究圖深證耳示禪人大凡截生死流濟無為岸無他奇特只貴當人根器猛利揭自胸𢙿了一切有為有漏如虗空花元無實性以照了之心返自觀省翻覆覷捕審諦諦審久之當有趣入之證蓋此段並非他物亦非他人能著力令自己省發如人負千斤擔子當由己有如許力量方能堪可若氣小力弱則被他壓倒去也所以道大人具大見大智得大用大丈夫漢打辦精彩豈可向山鬼窟子裏作活計有甚出徹之期應須發不可測不可量荷負大事超情離見卓絶頴邁之志直下透脫擺撥無始以來妄想輪回彼我得失是非榮辱穢濁之心令淨穢兩邊都不依怙翛然獨脫不依倚一物向千聖未有消息時生佛世間出世間不曾顯露處一念不生前後際斷踏著本地風光明見本來面目承當得直下牢固無毫髮見刺內外融通蕩蕩然得大安穩乃轉身吐氣於這邊來自然日用之中凡百施為之際一一朝宗返本豈是分外事耶雖喫飯著衣修世間法無不如如無不通透無不與所證正體相應更論甚高低向背才生見刺即刺却命根爾祖師及古宿德行棒行喝作用百千億種無他志元只令人自透脫自休歇如大死人豈只了自己度世便休勉有餘乃不忘悲願推此以發未悟居人間世泛然若不繫之舟喚作無心道人今既未能頓了頓明且放教若身若心空勞勞地虗寂既久驀地打破漆桶到桶底子脫處也不難況自具猛利根性荷負佛事作為殊特奇勝之緣此豈借別人力耶是故古者道學道須是鐵漢著手心頭便拌示詔副寺昔雪山童子為半偈捨全軀可祖斷臂立雪沒胯求一句子老盧八箇月負舂象骨飯頭擔桶杓同巖頭事園欽山補紐而九上洞山三到投子只為究此段其餘效勤勠力臥雪眠霜攻苦食淡蓋不可勝數鞠其趣向初不為名聞苟利養並以死生大事為懷紹隆佛祖種草作務是故雖埋光雪林聲迹不到人間往往有終老至死脫然獨得如鳥出籠了然明證萬世不移至如傳記所載太山毫芒十一於百千萬特少分爾其為高隱深遁流轉溝壑長往不顧豈有涯量哉是故諸佛垂世祖師西來大意全機超情識越詮表逾影迹出聖量豈細事耶唯大有志之士宿薰種勝根力不群然後能堪此任雖頭目髓腦不自愛惜況小小艱勤哉往時大達之士得旨之後深關牢藏起順違方便故意作害現怒罵鞭叱百種千端要試驗學人待其經苦楚不動心乃與一拶一挨垂片言纖機如大飢困人得食如醍醐甘露灌注珍重欣快拳拳不失成就大法器踐履向上人道徑猶須爛骨董地熟始可委付如讓祖之於曹溪八年始道得箇説似一物即不中稜師至雪嶺十五載坐破七箇蒲團靈雲三十年涌泉四十祀德山臨濟皆依師門歲月甚久蓋此道乃千聖不傳之妙豈可以輕心慢心而趣入哉永嘉云粉骨碎身未足酬一句了然超百億霜華諸道者在大溈執務一日庫前自篩米大圓過拾遺一粒米謂云道者勿輕此粒百千粒從此粒生諸乃返徵百千粒既從此粒生和尚且道這一粒從甚處生大圓拂袖而去晚小參謂衆云大衆米裏有蟲趙州到桐城路逢投子挈一油瓶遂云久嚮投子只見賣油翁投子云公且不識投子州云如何是投子投子提起油瓶云油油米裏蟲何似油裏蟲若參得投子即見石霜何故豈不見道衆裏有人衲僧家第一須得具金剛眼第二須得金剛寶劒第三須得柱杖子第四須得衲僧巴鼻直饒一一透得更須知有末後句始得示燈上人要直截透脫須先深信自己根腳下有此一段輝騰今古迥絶知見淨倮倮沒依倚常在目前無毫髮相寬同太虗明逾杲日天地萬物有成壞此箇無變無移古人謂之不與萬法為侶底人亦號如來正遍知覺但諦實承當使一念不生徹透本來元不動搖長時無間若行若住百種作為初不妨礙歷歷孤明一機一境一句一言皆含法界稱本真如情想計度無起滅處以此正印一印印定自然隨方逐圓悉非二種他自古明見佛性得道之士運用作為未嘗不在觀塵緣境界無塵緣可得鞠歸一真實際如此退步一日之功便抵一劫是故南泉道王老師十八上便會作活計不是揭搦強為蓋任運騰騰寬通自在天龍鬼神覔他起心行處不得此無心人行履直下深嚴若能休歇知見解礙將來便有徹證之分亦解作活計去要須揭志勉強然後無行不圓於曹溪路上得無間力用也示禪人利根種智聊聞舉著徹底透頂直下承當了無別法撒手便行豈復更有遲凝正如秉利劒當門阿誰敢近到箇裏凜凜神威佛祖莫能近傍吞爍羣靈豈不是得大解脫更不立向上向下超然獨證是故從上人立一機垂一言謂之垂鉤四海只釣獰龍到箇裏不論如之若何要箭鋒相拄一擊便過才涉擬議則千里萬里去也只如達磨面壁少林九年唯有可祖默契如今要立地明得也不難但辦撥却從前作解種種機智不立毫末使胸中淨倮倮聖凡不存彼我不拘一念不生單刀直入更覔甚佛高步毗盧頂不稟釋迦文破的破機超宗出格引頭方外看誰是我般人始可作種草然後向千人萬人羅籠不住處不辱一條線硬糾糾地壁立千仞等間拈一毫芒便見畐塞十虗拈示同風同德而不期自會不言而知互作主賓建宗立旨雖相去遠隔河沙長如目擊可透向上機了生死事報恩立法俾群靈一一如是方稱箇大丈夫作奇特緣了殊勝事昔裴相之與黃檗李習之之與藥山楊大年之與廣慧李都尉之與慈照無不以此投機既已投機復資此以履踐外空諸見內絶心智徹底平常騰騰任運為內外護流通大法所謂要知恁麼事須是恁麼人若是恁麼人始解恁麼事示魯叟佛法如大海萬有包含不可以形器數量所能測度一一俱無邊際若欲造入須辦箇沒量大智見窮法界等虗空盡未來不退轉跂步超越合下如鐵石堅固然後廓頂門正眼慎擇真實具本分作家手段大宗師息心依附將死生大事託之無透脫超證不已第一先得不落窠窟而能直截明見本來面目踏著本地風光深根固蒂信得及了得徹虗寂靈明不動不變為基址情念計較俱不生直得空豁豁地前後際斷與諸聖不移易絲毫許諦了自己其次展轉退步一切不留而能於毛端現剎海納須彌於芥中拈起向上機提持祖佛令到此正好著力及去今時玄妙理性妙句奇言掀天作略擺撥盡方始體得那邊意旨幾時更肯道我會佛法能活脫逞機用也若履踐得攸久分明無事安樂人矣將知聖賢撗身為此臨事不為立功能逞我見意在令人人無疑無為無事去今雖富春秋居貴富而以夙昔願力高識遠見要學此道潔清身意不捨世緣乃修淨行初段早已真正也要辦長久不退之心縱逢一切違緣處之如食餳蜜養得純熟便是大解脫人佛法與世諦豈有二種耶推此直前何往不利古人道千里同風蓋不言而照不面而知豈假繁詞哉是故毗耶大士一默文殊贊善瘥病不假驢駝藥意在鉤頭應須領取向獨行獨步處靠實考究看從何而起自何而來去縛解黏不真何待無業只説箇莫妄想俱胝只豎一指天皇胡餅趙州喫茶雪峰輥毬禾山打鼓渾無別事參示禪者達磨祖師觀此土有大乘根器由是自天竺西來傳教外旨直指人心不立文字語句蓋文字語句乃末事恐執泥之即不能超證所以破執著去玄妙離聞見出意表如擊石火閃電光一念不生直下透却根塵向各各根腳下承當領覽此一段大因緣翛然獨脫不依倚一物含吐十虗湛然澄寂契悟本來妙心此心能生一切世間及出世法唯宿薰種性略聞提取即知落處更不從別處流出全心即佛全佛即人人佛無二一道清虗豈有得失是非違順好惡長短來有為有漏如幻如夢了無一塵長久是故蘊才智有力量底即能發一念真正菩提心不為諸緣所牽貴富所拘動是歷歲月不退不轉埋頭向前念茲在茲回光返照諦了從上來威音那邊萬緣根本才覷得透即身心泰然二六時中更不放舍直候徹證乃能事畢矣況當人合下性靜純一慈善無如許惡覺惡知而復相續綿綿體究豈不善哉古人道百草頭邊薦取只如從朝至莫是箇什麼但念念覷捕心心無住攸久純熟只見光輝觀一切法空不曾有實唯此一心亘今亘古可以透脫死生學此道者不得其門只為情在解上觸途成滯若一切盡情打疊𮌎中不存纖微自然七通八達也但長時無間消遣將去淨念聖解尚令不生何況觸情而動作衆不善耶親近善知識只貴提誘與己作增上緣世尊記當來一牛吼地有善知識遞相擊勸相與行持體此妙道矣鏡清云汝等十二時中須管帶始得趙州云我使得十二時佛言若能轉物即同如來既已久存誠唯務向前得不退轉等間要當心中不留一物直下似箇無心底人如癡兀不生勝解養來養去觀生死甚譬如間便與趙州南泉德山臨濟同一見也切自保任端居此無生無為大安樂之地乃甚善耶示禪人西方大聖人出迦維羅作無邊量妙用顯發剎塵莫數難思議殊特正因以啓迪群靈其方便順逆開遮餘言遺典盈溢寶藏及至下梢始露一消息謂之教外別行單傳心印金色老子已來的的綿綿只論直指人心見性成佛不立階梯不生知見利根上智向無明窟子裏瞥破煩惱根株中活脫應時超證得大解脫是故竺乾四七東土二三皆龍象蹴踏師勝資強機境言句動用語默有上上乘根器格外領略當下業障冰消直截承荷於餘時自能管帶打作一片度世絶流頓契佛地尚不肯向死水裏浸却唱出透玄妙越佛祖削去機緣剗斷路布如桉太阿凜凜神威阿誰敢近作家漢確實論量才有向上向下勝妙理性作用纖毫即叱之不是從來種草直下十成煅煉得熟踐履得實始與略放過猶恐異時落草負纍人瞎却正法眼嗟見一流拍盲野狐種族自不曾夢見祖師却妄傳達磨以胎息傳人謂之傳法救迷情以至引從上最年高宗師如安國師趙州之類皆行此氣及誇初祖隻履普化空棺皆謂此術有驗遂至渾身脫去謂之形神俱妙而人間厚愛此者怕臘月三十日慞惶競傳歸真之法除夜望影喚主人翁以卜日月聽樓鼓驗玉池覘眼光以為脫生死法真誑唬閭閻揑偽造窠貽高人嗤鄙復有一種假託初祖胎息説趙州十二時別歌龐居士轉河車頌遞互指授密傳行持以圖長年及全身脫去或希三五百壽殊不知此真妄想愛見本是善因不覺墮在荒草而豪傑俊頴之士高談大辨下視祖師者往往信之豈知失故步畫虎成狸遭有識大達明眼覷破居常衆中惟默觀憫憐豈釋迦文與列祖體裁止如是耶曾不自回照始末則居然可知矣海內學此者如稻麻竹葦其高識遠見自不因循恐乍發意未入閫奧揭志雖專跂步雖遠遇增上慢導入此邪見林末上一錯永沒回轉其流浸廣莫之能遏因出此顯言庶有志願於大解脫大總持可以辨之而同入無生大薩婆若海泛小舟濟接群品俾正直妙道流於無窮豈不快哉示遠猷奉議從上徑截一路直超升無出直指人心見性成佛但此心淵奧脫去聖凡階級只貴利根上智於無明具縛窠窟中不動纖毫直下頓契廓徹靈明與有情無情有性無性同體與大法相應發起作用透古超今騎聲蓋色虗而靈寂而照無量無礙不思議大解脫一一七穿八穴了無回互便識落著所以乃佛乃祖謂之單傳密付如印印空如印印泥如印印水萬德照然十方坐斷獨證獨超初無依倚若起見作相則沒交涉也今時大有具種性之士能始末覷破幻緣幻境猛勇奮志向箇邊來亦有久存誠探賾者然患缺方便力止以知見解會為明了殊不知全坐子但是識心縱解到佛邊窮到修證盡頭處不出指蹤在是故古來作家宗師不貴人作解會唯許人舍知見𮌎中不留毫髮許蕩然同太虗空攸久養得成熟此即是本地風光本來面目也到此亘古亘今之地脫離生死有甚難耶如裴相國龐居士㨾直以信得及便得力受用自在塵緣夢境豈從別處生若腳下諦實二六時中更轉一切物而無能相等間空勞勞地不生心動念隨自天真平懷常實便是從宦遊幹斡悉皆照透承阿誰恩力既識得渠則如下水船相似略左右照顧扶持將去自然速疾於般若相應此禪流所謂自做工夫觸處無有虗棄底時節綿綿長久辦不退轉心不必盡棄世間有漏有為然後入無為無事當知元非兩種若懷去取則打作兩橛也一切時一切處唯以此為實在力行之當截斷衆流得大安樂矣示嚴殊二道人參須實參見須實見用須實用證須實證若纖毫不實即落虗也此實地乃三世諸佛所證歷代祖師所傳惟此一實謂之腳踏實地初則須大悟若只認門頭戶底作窠窟説路布立機境照用取捨解會則不徹也此透生死要徑到﨟月三十日一千二百斤擔子須是自有力量荷負得行方可翛然獨脫是故無業國師垂示臨終之際若一毫凡聖情量未盡纖毫思慮未忘便乃輕重五陰去也古人以生死事大是以訪道尋師決擇豈可只學語言理會古人公案下得三五百轉好語便當得也將知聰明黠慧皆為障道之本要須冥然扣寂不怕放教身心如土木瓦礫驀然翻却業根種子便乃知非見學佛學法如中毒藥相似然後透出佛法乃體得本分事也此非小緣就分是久參之士尤宜放下不擔著禪道不輕毀上流愈透徹愈低細愈高明愈韜晦作箇百不知百不會無用處底人行不動塵言不驚衆淡然安間常行恭敬始堪保任於一切違順境界心不動搖志無改易達磨謂之一相三昧一行三昧切宜履踐純熟以至古今作用機緣便七達八通亦不留在𮌎次等間蕩蕩地觸著便轉捺著便動拘牽惹絆不得居千人萬人之中如無一人相似不是強為任運如此更須如末後一語始得參示道明此道至玄妙深邃是以佛祖不容擬議要直截承當超出見聞色聲之表單契密領謂之教外別行然得之奧用之徹脫去理障烹煆淨盡到極則之地須遇大達善決擇之士剔撥猛咬斷線索始能無佛無祖窠窟只平白泛泛地於日用之間透頂透底擔荷無一法當情無一念可得等間作為向一切境界之中圓融無際亦無圓可融亦無融可圓始行無間道中遊歷絶功勛處喚作平常心不可得似此腳踏實地無落虗底工夫綿綿密密便掃田掠地拈筯把匙種種作為皆入場屋是故地藏呵僧云南方説禪浩浩地便道爭如我箇裏種田博飯喫準此而推忍苦捍勞繁興大用雖粗淺中皆為至實惟貴心不易移一往直前履踐將去生死亦不奈我何何況餘事永嘉道上士一決一切了信矣示侍者法榮學道之人能矻矻孜孜以生死之事居懷晝三夜三不憚勞苦事善知識求一言半語發藥雖遭呵斥種種惡境而力向前非自宿昔薰成自然種智必且猶豫或則退悔能於此恬然初無動搖其志願亦頗難得然此本有之性現定見聞知覺父母緣不可生境界緣不可奪若隨向來知解即墮業識若猛擺撥棄著一邊只守虗靜到一念不生之地掀翻解路不落機緣直下了了無毫髮疑間便截徑承當無第二頭則玄妙理性尚自脫去況隨世間事物所轉耶是故古人即心即佛得大力量向上上不立佛祖如紅爐猛𦦨處透徹但把得住作得主便住山去此須十年工夫一色專注便可趣向入也趙州云你向衣單下坐十年若不會禪截取老僧頭去斷定不在言句機境上只要心休意歇便徹底安樂耶示道人當人腳跟下一段事本來圓湛不曾動搖威音王佛前直至如今廓徹靈明如如平等只為起見生心分別執著便有情塵煩惱擾攘若以利根勇猛身心直下頓休到一念不生之處即是本來面目所以古人道一念不生全體現此體乃金剛不壞正體也六根才動被雲遮此動乃妄想知見也多見聰明之人以妄心了了放此妄心不下逗到歇至不動處不肯自承當本性便喚作空豁豁地却擬棄有著空是大病若有心棄一邊著一邊便是知解不能徹底見性此性非有不須棄此性非空不須著要當離却棄著有無直下怗怗地圓湛虗凝翛然安穩便能自信此真淨妙心餉間被世緣牽拖便能覺得不隨他去覺即把得住不覺即隨他去直須長時虗間自做工夫消遣諸妄使有箇自家省悟之處始得昔人云不離當處常湛然覔即知君不可見耶示仲宣維那嶺外祖師曹溪乃佛種也發迹新城開法番禺如日照世如麟鳳呈祥海內莫不宗仰厥後揭揚大巔三平龍象間出昌黎見刺為世明炬是知彼有人焉蓋絶俗離倫真克家種草也其跂步志業如天之高那肯碌碌遁行逐隊耶昔興化謂克賓你不久為唱導之師云我不入者保社化徵云會了不入不會了不入賓云沒交涉乃行令罰錢出院多少人墮在常情不然作奇特機關豈知他家通霄正路只管望風摶摸要須是箇中人方可與曹溪大巔三平興化克賓羽毛相似也且作麼生是箇中人鳳凰直入煙霄外誰怕林間野兒示中竦知藏巖頭道大凡扶宗唱教意在未屙時一覷便透縱然理論亦沒痕迹良哉真作家手段也明眼漢才入門來已辨深淺更待鼓兩片皮弄泥團豈有了期雪峰問投子一槌便成時如何云不是性懆漢不假一槌時如何云不快漆桶他古人自有如是風範要離泥水截葛藤嚙鏃破的雷卷風旋乘機當陽劈面快與乃稱臨濟宗風亦不辜方來依扣以言破言以迹剗迹不墮死水逴得便行驅耕牛奪飢食意在出生死越聖凡平人我融染淨承當輝天照地大解脫自利利他紹聖種族不見道二祖不往西天達磨不來東土與人去縛解黏拔屑抽釘正在密室中不將實法繫綴人從頭與伊槌將去一人半箇眼目定動堪作種草若求義路立解會治擇語句商較古今寧可無人掃地此乃據曲彔床本職事也時中勤勤垂手繼之不倦若只管推懶則失却本宗辜負先聖白雲師翁云未透時一似鐵壁及至透得元來鐵壁便是自己也須作得鐵壁定始得然後著著有出身之機始副巖頭點破綱宗體段也九尾野狐多戀窟金毛師子解翻身示錢次道學士人人腳跟具有此一段大事佛與衆生無異無別但佛覺證圓融群靈染惑遂相懸遠是故諸聖出興獨唱此大法謂之直指人心見性成佛特接上機要利根種性覿面相呈更不擬議逴得便行所以靈山立却榜㨾才拈起花迦葉便笑若更論他如之若何則蹉過也器量既等無虗授者自爾源源到今得證契悟如恆河沙只如俱胝見天龍得一指鳥窠吹布毛侍者大悟豈有許多路布言詮返惑亂其真性舉要而指唯是靈利上智以透脫根塵截斷生死為意向日用中高著眼覷破萬緣一切勝劣境界了無一實惟有本來靈明大解脫亘古洞今長時活鱍鱍地一念契合得無礙便放下人我知見世智辨聰喜慍得失種種執著坦然一切平懷初不妨日逐作用築著磕著俱為本地風光應物現形不將不迎湛然真寂逗到臘月三十日便了當得所謂把得住作得主豈不見老龐長養臨行謂于頔相公但願空諸所有慎勿實諸所無枕公膝乃行楊侍郎透徹圓融立節立朝下梢啓手足乃云漚生與漚滅二法本來齊要識真歸處趙州東院西不是向結交頭得力也大凡存誠向慕本不希聞見談柄正欲確然清身潔意內守虗間外廓聞見密運慧刃剸割情欲返照回光如靈雲見桃花香嚴聞擊竹以至不是風動不是幡動仁者心動非風鈴鳴我心鳴耳示處謙首座先德垂機立教初不等間必使萬世仰法為標準是故摩竭掩室少林冷坐毗耶杜詞善現宴寂蓋有為而為如北辰據位百川潮宗虎視龍驟風回雲合知有者默識其趣向不做道理便可直領深入其閫奧即體裁步驟自然𭰞合當其初立似若適會及已成形聲則不可掩卓卓驚世漸漸日新至於德嶠縱白木棒濟北振奮雷喝俱胝只立一指頭祕魔擎箇鐵杈子象骨輥三毬禾山四打鼓國師水碗溈阜牧牛俱逗逸群絶類作略而西園燒浴金牛召飯天皇餅趙州茶極於細微洞徹淵奧不負時機超宗出格真麒麟頭角師子爪牙異世仰之不可跂及逮發一句施一機尤不可意象名模也有志之士未發足已蘊此作驀地超方遇緣豈局促籠檻為循循頻頻之黨哉所以於不已中聊發所蘊追配古人高風自不凡爾然遇賞音即不徒然當使垂之竹帛亦無忝也故豫心腹而為表出之示悟侍者雲門示衆云和尚子莫妄想山是山水是水僧是僧俗是俗時有僧問學人見山是山見水是水時如何雲門以手面前劃一劃云佛殿為什麼從箇裏去舊時在衆參見説無事禪底相傳云山是山水是水平實更無如許事撥去玄妙理性免得鑿空聒撓心腸所以雲門慈悲開一線路指示者僧便領覽得出來問雲門便用後面高禪茶糊鶻突伊遂以手劃云佛殿為什麼從者裏去此乃移換它也所以大凡只説實話是正禪才指東劃西是換你眼睛但莫信它但向道我識得你苦哉苦哉頓却山僧在無事界裏得二年餘然𮌎中終不分曉後來驀地在白雲桶底子脫方猛覷見這情解死殺一切人生縛人家男女向無事界裏𮌎中一似黑漆只管長無明業識貪名取利作地獄業自謂我已無事了也細原雲門意豈只如此哉將知醍醐上味遇此翻成毒藥若是真實到雲門田地安肯如此死殺則其提振處併將佛祖大用大機顯示則以手劃云佛殿為甚從者裏去千聖應須倒退便是具大解脫知見底也須飲氣吞聲山僧抑不得已聊且露些只知音知耳大凡參學須實究到絶是非離得失去情塵脫知見然後可以入此流矣參云憑希蒙厭三界火宅蘊爽邁風度潔清緣業從方外遊乃給孤淨名裴公老龐趣向豈非英傑偉特驚群敵聖者哉然此段由威音七佛已前下及窮未來際萬有十虗把斷包攝悉無透漏要一舉便明拈著便了早是鈍置也所以丹霞生知龐老通方目機銖兩勘辨諸禪高步叢林平沉數萬珠金脫却幞頭一味向無間道中行寧可鬻笊籬赤日裏臥街曾無歉怍及至逢人逆拈倒用莫非踏上頭關捩作略如今既操此志根性氣度幸自不凡唯務退損精修長久不變不轉乃克全體受用只如剗佛殿前草騎聖僧頂燒木佛一口吸盡西江水不昧本來人皆圜機活脫出沒隱顯唯上流作家識其起倒自餘立亡坐往俱為餘韻真所謂三界外人豈火宅所能羅籠也但使銀山長壁立不須入草更求人示華嚴居士平常心是道才趣向即乖到箇裏正要腳踏實地坦蕩蕩圓陀陀孤迥危峭不立毫髮知見倒底放下澄澄絶照壁立萬仞喚甚作心作佛作玄作妙一往直前不起見不生心如猛火聚不可近傍似倚天長劒孰敢攖鋒養得純和沖淡透徹無心境界便可截生死流居無為舍端如癡兀拍盲罔分皂白猶較些子所謂絶學間間真道人也了了回光深深契寂乃絶滲漏自然與向上人不謀而同不言而喻若作聰明立知見懷彼我分勝負則轉沒交涉此唯尚猛利快割斷懸崖撒手棄捨得性命便當下休歇只大休處是究竟合殺處爾示無住道人維摩經依無住本立一切法金剛經應無所住而生其心古德云一切無心無住著世出世法莫不皆爾使有住則膠固豈復能變通耶日月住則無晝夜四時住則失歲功唯其無住乃所以流於無窮是故住於無所住所以轉凡成聖即無作無為無住妙用於萬有中得大解脫既達此理見此道唯力行不倦乃真道人也示元長禪人佛語心為宗達磨傳此者矣而馬師為蛇畫足慈悲落草乃云諸人欲識佛語心麼已是漏逗了也更言只如今語便是佛語此語出於自心便是佛心若舉揚正宗作如是話會如何出得作家八十四人邪是故從上來行正令底視之如將惡水澆潑人成甚模㨾應知這老子太煞屈曲事不獲已然今學者尚看他底不破只管落語言執解會認光影做窠窟好不性僺也可中有箇生鐵鑄就手裏握得頑石粉碎眼目定動擬議不來一綽便透更説甚佛語心如之若彼直饒千佛萬祖躬親動地放光如雲如雨行棒行喝雷奔電激不消箇熱不釆等間凡不收聖不管更喚甚作生死菩提涅槃煩惱不如飢來喫困來打眠此乃稍稍類他家種草也所以地藏道你南方佛法浩浩地爭如我種田博喫十成是以此為事徹到無事如斬一綟絲一斬一切斬把斷世界不漏絲毫諸見不生了無滲漏以長歲月不動不退靠之自然成辦香林四十年方打成一片溈山三十載牧一頭水牯既有此志深宜長久乃能堪報不報之恩是真出家大解脫衲子也示丹霞佛智裕禪師祖師宗風步驟闊遠逈出教乘丹提正印靈山拈瞬而飲光笑領龍猛示圓相而提婆中的少林覓心而二祖超證盧老説偈而大滿付衣鉢人皆以為密傳鞠其端倪乃是納敗豈造妙深極之旨止如是而已要須如天之高地之厚海之淵虗空之廣尚未髣佛信過量大解脫人回天轉地吸海枯竭喝散虗空奮大機顯大用於無邊香水浮幢剎外斬魔外見網摧佛祖化權揭示不可示拈提不可提之奧尚未為的則雪峯鼇山得道雲巖始終不知有乃戲論爾應須生鐵鑄就心肝殺人不眨眼手段乃可略露風規貴慧命流於無窮差可人意耳建炎三年閏月十一日前雲居圜悟禪師克勤書與耿龍學書批妙喜示來教見矻矻於此意況甚濃真不忘悲願也而以宗正眼照破義路情解透見肝膽何明眼如此正宗久寂寥後昆習窠臼守箕裘轉相鈍致舉世莫覺其非大家隨語生解祖道或幾乎息矣不有超卓頴悟之士何以規正哉此皆正念乃真外護也時節擾擾山居領衆亦未可保全尚未有可乘之便為轉身之許爾杲佛日一夏遣參徒踏逐山後古雲門高頂欲誅茆隱遁其志甚可尚今令謙去山叟為書數語及疏頭亦與輟長財成之可取一觀也渠欲奉鋤正在高裁也克勤啓上示楊無咎居士佛祖出興于世以大悲願力起無緣慈唯務引接利智上根具大器量堪委任大解脫上上勝妙玄機作人所不能為超群絶衆可以彈指證無生可以立地越果海眼觀東西意在南北如快鷹俊戞戞騰雲迷風曜日捎玉兔拂金雞英靈掀豁乃拈當頭末上一著子似電閃星飛不容擬議待伊全體脫去籠羅直下不費一毫指點遂乃披襟透頂透底領略即兩手分付是故體裁步驟如獰龍之得水似猛虎之靠山雲突突風颭颭傾人肝膽耀人心目方可謂之本家種草所以維摩大士大集會魔王現首楞嚴定魔界行不污菩薩之儔與夫文殊普賢金色頭陀之類皆離倫萃而一旦舉花密傳豈常事哉以至達磨西來神光瞥地自爾多沒量大人特達精通只向動用瞬揚語默舒卷縱擒與奪顯發底裏長時已思不露等間兀兀地若百不知百不會底人及乎挨拶著便見驚群動衆雖然鞠其至趣初無如許多事唯直下明妙一切無心而已苟能棄去學解執著放教間間地聖諦亦不為自然契合從上來綱宗便可入此選佛場中轉度未度轉化未化得不是再來人間世不依倚一物無為絶學真正出格大道人耶詔使觀察楊公無咎高識遠見博學多能而於祖道尤深造詣智鑒機警未舉先知未言先透在都下日獲參陪茲沿帝命使宣撫司再會錦官持辱道照臨還索葛藤因出此納敗云示成都雷公悅居士如今照了本心圓融無際色聲諸塵那可作對逈逈獨脫虗靜明妙要須徹底提持勿令浮淺直下高而無上廣不可極淨裸裸圓垛垛無漏無為千聖依之作根本萬有由之建立應須斗頓回光自照令絶形段分明圓證萬變千化無改無移謂之金剛王謂之透法身餉間行住坐臥無不透徹物物頭頭靡有間隔喚作乾白露淨單明自心不可只麼守之守住便落窠窟却須猛割猛斷十分棄捨轉捨轉明轉遠轉近抵死打疊令斷却命去始是絶氣息人方解向上行履若論向上行履唯己自知知亦不立釋迦彌勒文殊普賢德山臨濟不敢正眼覷著豈不是奇特底事一棒上一喝下一句一言若細若粗若色若香一時穿透方稱無心境界養得如嬰兒相似純和沖淡雖在塵勞中塵勞不染雖居淨妙處淨妙收它不住隨性任緣飢餐渴飲善尚不起念惡豈可復為所以道隨緣消舊業更莫造新殃又示道貴無心禪絶名理唯忘懷泯絶乃可趣向回光內燭脫體通透更不容擬議直下桶底子脫入此大圓寂照勝妙解脫門一了一切了只守間間地初不分彼我勝劣才有毫芒見刺即痛剗之放教八達七通自由自在長養綿密千聖亦不見自己尚似冤家只求得遠離不隈傍翛然澄靜虗而靈寂而照猛勇斷割徹底無纖毫撓𮌎次王老師謂之作活計趙州除粥飯二時是雜用心悠久踐履使純熟乃令從上來無心體道密密作用自見工夫到下梢結角頭自然如懸崖撒手豈不快哉示張持滿朝奉克勤自出峽止訥堂唯念茲在茲相從者多不告倦所為利他乃自利也要須根本明徹理地精至純一無雜才有是非粉然失心若踏正脈諸天捧花無路魔外潛不見深深海底行高高峯頂立始得不驚群動衆謂之平常心本源天真自性也雖居千萬人中如無一人相似此豈粗浮識想利智聰慧所能測哉示諭綿密無間寂照同時歲月悠久打成一片而根本愈牢密密作用誠無出此應當當處全真則彼我遐邇觸處皆渠剎剎塵塵皆在自己大圓鏡中愈綿愈密則與能轉換也故雲門道直得乾坤大地無纖毫過患猶為轉物不見一色始是半提直得如此更須知有全提時節始得所以德山棒臨際喝皆徹證無生透頂透底融通自在到大用現前處方能出沒欲人全身擔荷外退守文殊普賢大人境界巖頭道他得底人只守間間地二六時中無欲無依自然超諸三昧德山亦云汝但無事於心於心無事則虗而靈寂而照若毫端許言之本末者皆為自欺此既已明當須履踐但只退步愈退愈明愈不會愈有力量異念才起擬心才生即猛自割斷令不相續則智照洞然步步踏實也豈有高低憎愛違順揀擇於其間哉無明習氣旋起旋消悠久間自無力能擾人也古人以牧牛為喻誠哉所謂要久長人爾直截省要最是先忘我見使虗靜恬和任運騰騰騰騰任運於一切法皆無取捨向根根塵塵應時脫然自處孤運獨照照體獨立物我一如直下徹底無照可立如斬一綟絲一斬一切斬便自會作活計去也佛見法見尚不令起則塵勞業識自當氷消瓦解養得成實如癡似兀而峭措祖佛位中收攝不得那肯入驢胎馬腹裏也趙州道我見千百億箇盡是覔作佛漢子於中覔箇無心底難得又云我在南方三十年除粥飯二時是雜用心處香林四十年方成一片湧泉四十年尚自走作南泉十八上解作活計信知從上古人無不皆如此密密履踐安可計得失長短取捨是非知解也同學之中唯龍門智海昔常熟與究明但逢緣遇境莫不管帶何止此生而已窮未來際證無量聖身也未是他泊頭處但一味退步切莫作限量也示吳教授佛祖以禪道設教唯務明心達本況人人具足各各圓成但以迷妄背此本心流轉諸趣枉受輪回而其根本初無增減諸佛以為一大事因緣而出蓋為此也祖師以單傳密印而來亦以此也若是宿昔蘊大根利智便能於腳跟直下承當不從他得了然自悟廓徹靈明廣大虗寂從無始來亦未曾間斷清淨無為妙圓真心不為諸塵作對不與萬法為侶長如十日並照離見超情截却生死浮幻如金剛王堅固不動乃謂之即心即佛更不外求唯了自性應時與佛祖契合到無疑之地把得住作得主可不是徑截大解脫耶探究此事要透死生豈是小緣應當猛利誠忘信重如救頭然始有少分相應多見參問之士世智聰明只圖資談柄廣聲譽以為高上趣向務以勝人但增益我見如以油投火其炎益熾直到﨟月三十日茫然繆亂殊不得纖毫力良由最初已無正因所以末後勞而無功是故古德勸人參涅槃堂裏禪誠有旨也生死之際處之良不易唯大達超證之士奮利根勇猛一往截斷則無難然此段雖由自己根力亦假方便於常時些子境界中轉得行打得徹不存解不立見凜然全體現成踐履將去養得純熟到緣謝之時自然無怖畏只有清虗瑩徹無一法當情如懸崖撒手棄捨得無留戀一念萬年萬年一念覔生了不可得豈有死也是故古德坐脫立亡行化倒蛻能得勇健皆是平昔淘汰得淨潔香林四十年得成一片湧泉四十年尚有走作石霜勸人休去歇去如古廟裏香爐去永嘉云體即無生了本無速蓋業業競競念茲在茲方得無礙自在既捨生之後得意生身隨自意趣後報悉以理遣不由業牽所謂透脫生死耶報緣未謝於人間世上有如許參涉交牙應須處之使綽綽然有餘裕始得人生各隨緣分不必厭喧求靜但令中虗外順雖在閙市沸湯中亦恬然安穩才有纖毫見刺則打不過也示禪人末後一句都通穿過有言無言向上向下權實照用卷舒與奪不消箇勘破了也誰識趙州這巴鼻須是吾家種草始得示韓朝議乃佛乃祖直指此大法於人人跟腳下洞照如千日並出但趣外奔逸久不能自信有如是大威德光明唯務作聰明立知見向業惑中以謂出乎等衒耀自得向人間世所習古今博究廣觀謂窮極底蘊殊不知螢火之光豈比太陽所以古之奇傑之士頴脫之性就近而論如裴相國楊大年之儔投誠放下就宗師決擇剗去浮塵知見大徹大悟始能超軼與老禪碩德抗行履踐到臨合殺結角頭自解撒手克證大解脫豈小事哉今既明敏不減前輩平時學業才力邁往於世路久之雖知宗門有此段緣謂不出我所宗尚殊不著意以夙昔大緣相值歐峯經年會聚一聞舉揚即起深信回光返照𮨇人間世如夢如幻隨大化變滅乃虗妄爾唯此千劫不壞不移易一切聖賢根本乃造物之淵源印定自己若一發明七通八達何往不自得哉是知宿世亦曾薰炙遇緣而彰見於行事豈非自信耶然能自撿點二六時中學佛法已是雜用心則去却佛法乃真淨界中行李矣但請依此一切不雜即純一洞然無愛憎離取捨不分彼我不作得失一切法坦然皆我家不思議處淨妙圓明受用之物爾須令此心長時現前不墮沉昏不生聰慧入平等安間寂靜境界那有惡作業緣識情干撓得此本妙光明也只恐臨境界面前都盧忘失依前紛亂則不堪也古人修行亦只以自所證入時中照了截斷塵勞教活卓卓地悠久三二十年純熟超出生死不為難著力在行處不只空高談説之而已古云説得一丈不如行得一尺蓋定慧之力回轉業緣正要惺惺地勇猛果決千百生中當受用其餘古人機緣語句不必盡要會之但一著分明則著著如此千變萬化豈移變得渠力用哉內心既虗外緣亦寂著衣喫飯本自天真不勞凋琢若或立勝見負我能即禍事也切須照管勿作此態由是可入無我真實平等如如不動不變淨妙清涼穩密田地矣志公云不起纖毫修學心無相光中常自在示曾待制禪非意想道絶功勳若以意想參禪如鑽冰求火堀地覔天只益勞神若以功勳學道如土上加泥眼裏撒沙轉見困頓儻歇却意識息却妄想則禪河浪止定水波澄去却功用休却營為則大道坦然七通八達是故僧問石頭如何是禪頭云碌磚僧云如何是道云木頭此豈意想功勳所能辨哉除非直下頓領截流便透則禪道歷然才擬作解則千里萬里要是向來世智辨聰頓然放却消遣令盡自然於此至實之地自證自悟而不留證悟之迹翛然玄虗通達乃善馬大師嘗舉楞伽經以佛語心為宗無門為法門乃云諸人要識佛語心麼只你如今語便是心心便是佛故云佛語心乃是宗也此宗無門乃是法門古人大煞老婆拖泥涉水若一舉便透猶較些子或窮研義理卒模𢱢不著示宗覺大師佛語心為宗宗通説亦通既謂之宗門豈可支離去本逐末隨言語機境作窠窟要須徑截超證透出心性玄妙勝淨境界直徹綿密穩審向上大解脫大休大歇之場等間雖似空豁豁地而力用圓證不拘限量千人萬人羅籠不住所以迦文老人久默斯要三百餘會略不明破但隨機救拔候時節到來乃於靈山露面皮拈出獨有金色頭陀上他鈎鈎謂之教外別行若諳此旨則威音已前漏逗了也點撿將來雖隨類化身千般伎倆萬種機緣無不皆是箇一著子此豈單見淺聞存知解墮機括者所測量是故從上來行棒行喝輥毬擎叉喫荼打鼓插鍬牧牛彰境智據坐掩門喚回叱咄與掌下踏莫不皆于此唯本色衲子自既了悟透徹又復遇大宗師惡手段淘汰煅煉到師子咬人不隨藥忌直截軒豁處方可一舉便知落處如獅子入窟出窟踞地返擲何人可測量哉此門不論挹泥涉水草裏輥打葛藤眼麻眯三搭不回者唯是八面受敵未舉先知未言先契自然水乳相合得坐披衣養得純熟待霜露果熟出頭來便與麼用始合祖先本因地發行一周佛事所以道要窮恁麼事須是恁麼人若是恁麼人不愁恁麼事
