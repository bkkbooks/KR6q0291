body:
  text: 嗣法子文編示璨上人依無住本立一切法無住之本本乎無住若能徹證則萬法一如求其分毫住相不可得只今現定作為全是無住根本既明如人有目日光明照見種種色豈非般若關捩乎永嘉云不離當處常湛然親切無過此語覓則知君不可見但於當處湛然二邊坐斷使平穩切忌作知解求覔才求即如捕影也不與萬法為侶是什麼人回光自照看待汝一口吸盡西江水即向汝道八角磨盤空裏走參得透目前萬法平沉無始妄想蕩盡德山隔江招扇使有人承當鳥窠吹布毛尋有人省悟得非此段大因緣時至根苗自生耶抑機感相投有地耶抑當人密運無間借師門發揮也何峭絶如此之難而超證如此之易古人以輥芥投針為況良不虗矣信得心及見得性徹於日用中無絲毫透漏全世法即佛法全佛法即世法平等一如豈有説時便有不説時便無思量時便有不思量時便無如此即正在妄想情解間何曾徹證直得心心念念照了無遺世法佛法初不間斷則自然純熟左右逢原矣有問隨問便對無問亦湛然常寂豈非著實透脫生死要綱也末後一句都通穿過有言無言向上向下權實照用卷舒與奪不消箇勘破了也誰識趙州這巴鼻須是吾家種草始得示寧副寺古人為此大因緣若師弟子相見未嘗不以是擊揚至於食寢間曠靡不攝念於此是故一言一句乃杖乃喝瞬揚舉動悉可投機蓋誠心專一無許多惡知惡見污染直截承當似不難今之兄弟根性差鈍而復駮雜雖參尋知識薰炙日久尚懷猶豫不能一往徹證病在不純一長久儻能不捨晝夜廢寢忘餐矻矻在道不患不如古人矣示詳禪人立志辦道之士於二六時中自照自了念茲在茲知有自己腳跟下一段大因緣處聖不增居凡不減獨脫根塵迥超物表凡所作為不立方所寂湛凝然惟萬變千化初不動搖應緣而彰遇事便發靡不圓成惟要虗靜一切超然主本既明無幽不燭萬年一念一念萬年透頂透底全機大用譬如壯士屈伸臂頃不借他力則生死幻翳永消金剛正體獨露一得永得無有間斷古今言教機緣公案問答作用並全明此若脫灑履踐得日久歲深自然左右逢原打成一片豈不見法燈道入荒田不揀信手拈來草觸目未嘗無臨機何不道無根兮得活離地兮不倒日用尚不知更向何處討切宜消息之示慧禪人水潦參馬祖問佛法的的大意馬祖與一踏遂大悟乃曰百千法門無量妙義只向一毫頭上識得根源豈不快哉即呵呵大笑以至平生示衆長云自從一喫馬師踏直至如今笑未休又復呵呵大笑蓋是存誠堅確正覔入頭處未得驀然遭踏便徹底承當擔荷透脫無疑尋吐出𮌎中所證亦不復以別事如今參學若果諦實宗師以一語一言一機一境投之撥著便轉豈有難事但患根浮識淺飄然似風過樹頭千回萬度提持亦未能便契何況更被作情解者指為無如是悟入之事馬師水潦亦只如是一期建立如此則直到驢年也未夢見在是故學道唯尚諦信慧禪人操履甚專聊出此以示方便耳若論此事如擊石火似閃電光明得明不得未免喪身失命只如明不得喪身失命則固是明得因什麼也喪身失命多少人到此疑著殊不知及得盡方到命根斷處換却心肝五臟與向上齊等所以道直下似懸崖撒手然後乃生鐵鑄就喚作透出荊棘林不疑天下老漢舌頭信有真的參學分示若虗庵主修道者尼學道之士初有信向厭世煩溷長恐不能得箇入路既逢師指或因自己直下發明從本已來元目具足妙圓真心觸境遇緣自知落著便乃守住患不能出得遂作窠臼向機境上立照立用下咄下拍努眼揚眉一場特地更遇本色宗匠盡與拈却如許知解直下契證本來無為無事無心境界然後識羞慚知休歇一向冥然諸聖尚覔他起處不得況其餘耶所以巖頭道他得底入只守間間地二六時中無欲無依可不是安樂法門昔灌溪往末山山問近離甚處溪云路口山云何不蓋却溪無語次日致問如何是末山境山云不露頂如何是山中人云非男女等相溪云何不變去山云不是神不是鬼變箇什麼如此豈不是腳踏實地到壁立萬仞處所以道末後一句始到牢關把斷要津不通凡聖古人既爾今人豈少欠耶幸有金剛王寶劒當須遇著知音可以拈出示良蘆頭禪人金色頭陀雞足峰論劫打坐達磨少林面壁九年曹溪四會縣看獵大溈深山卓庵十載大梅一住絶人迹無業閲大藏古聖翹足七晝夜贊底沙常啼經月鬻心肝長慶坐破七箇蒲團是皆為此一段大因緣其志可尚終古作後昆標準便使致身在長連床上亦不過冥心體究但令心念澄靜紛紛擾擾處正好作工夫當作工夫時透頂透底無絲毫遺漏全體現成更不自他處起惟此一大機阿轆轆地轉更説甚世諦佛法一㨾平持日久歲深自然腳跟下實確確地只是箇良上座直下契證如水入水如金博金平等一如湛然真純是解作活計但一念不生放教玲瓏才有是非彼我得失勿隨他去乃是終日竟夜親參自家真善知識何憂此事不辦切須自看示許奉議庭圭此箇事在利根上智之人一聞千悟不為難要須腳跟牢實諦當徹信把得定作得主於一切違順境界差別因緣打成一片如太虗空無纖毫障隔湛湛虗明無有轉變雖百劫千生始終如一方得平穩多見聰俊明敏根浮腳淺便向言句上認得轉變即以世間無可過尚遂增長見刺逞能逞解趂語言快利將為佛法只如此及至境界緣生透脫不行因成進退良可痛惜也故古人直是千魔萬難悉皆嘗遍雖七處割截亦不動念一往操心猶如鐵石以至透脫生死渾不費力豈不是大丈夫超情慷慨所存也在家菩薩修出家行如火中出蓮蓋名位權實意氣卒難調伏況火宅煩擾煎熬百端千緒除非自己直下本真妙圓到大寂定休歇之場尤能放下廓爾平常徹證無心觀一切法如夢如幻空豁豁地隨時應節消遣將去即與維摩詰傅大士裴相國楊內翰諸在家勝士同其正因隨自己力量轉化未悟同入無為無事法性海中則出來南閻浮提打一遭不為折本矣佛法無多子如俱胝豎一指打地只打地鳥窠吹布毛無業莫妄想中邑哆哆和和古堤無佛性骨銼一生只道箇骨銼只為信得及所以一生受用不盡若疑著便有異見差別有向上有向下豈能坐得斷所以貴久長乃難得人也既趣向得入根腳洞明當令脫灑特立孤危壁立萬仞佛病祖病去玄妙理性遣等間蕩蕩地百不知百不會一如三家村裏人初無殊異養來養去日久歲深朴實頭大安穩方得安樂終不肯露出自己作聰明顯作略衒耀知見趂口頭禪所以道十語九中不如一默也又道我見千百人只是覔作佛底於中求一箇無心道人難得此事最要行持而於行持不著相不居德是名無相真修香象渡河截流而過如此行持滴水滴凍尚不留於胸中何況特地起心作諸罪惡既已如是保護亦如是轉勸未悟便於此箇上調直純信無為無事豈不快哉示諧知浴此箇大法三世諸佛同證歷代祖師共傳一印印定直指人心見性成佛不立文字語句謂之教外別行單傳心印若涉言詮路布立階立梯論量格外格內則失却本宗辜負先聖要須最初入作便遇本分人直截根源退步就己以鐵石心將從前妄想見解世智辨聰彼我得失倒底一時放却直下如枯木死灰情盡見除到淨倮倮赤灑灑處豁然契證與從上諸聖不移易一絲毫許諦信得及明見得徹此始為入理之門更須教一念萬年萬年一念二六時中純一無雜才有纖塵起滅則落二十五有無出離之期抵死謾生咬教斷然後田地穩密聖凡位中收攝不得始是如鳥出籠自休自了處得坐披衣真金百煉舉動施為等間蕩蕩地根塵生死境智玄妙如湯沃雪遂自知時更無分外底名為無心道人以此修證轉開未悟令如是履踐豈不為要道哉古人為此一段因緣豈止忘餐廢寢至捨頭目髓腦斷臂負舂動是三二十年只如巖頭雪峰欽山雖同歷涉叢林各執一務效勤九度洞山三到投子凡所至處未嘗放過一宵一霎必遞相舉較互相切瑳邃契新豐豁存領旨德嶠觀其跂步體裁可謂法門龍象後學之人可以仰其陳躅無使虗棄光陰有忝昔賢耳昔天台韶國師少負俊才遊叢林所至投機已領師席最後抵金陵清涼大法眼禪師會下已倦咨參唯勉進隨侍之者摳衣籌室一日隨衆僧參有問如何是曹源一滴水答云是曹源一滴水師聞之前之證解渙若冰釋方為得大安穩是知學解因人所領十言一句一機一境只益多聞到究竟至實之處須是桶底子脫始得此事斷定不在言句中若執著記憶以為己見如畫餅豈可充飢然大達之士超證諦實及至投機於語句間迥出塗轍機境筌蹄籠羅他不住只如石頭問藥山你在此作什麼對云一物不為頭云如此則間坐也對云間坐則為也石頭又問子道不為不為箇什麼對云千聖亦不識石頭乃以頌贊云從來共住不知名任運相將只麼行自古上賢猶不識造次凡流豈可明似此豈不是徹證底人語話機量言句何曾拘束得他若理地不明胸次有物問著如氈上拽貓兒是故祖師道心隨萬境轉轉處實能幽隨流認得性無喜亦無憂叢林兄弟參問最初的有正因於善知識邊自陳生死事大己事未明推此所言豈是泛泛為名為位為我能我勝若始終一貫常持此心不憂己事不明及更親近稍久自己分上未有毫末相應處便論量如之若何彼見解長短增長我見覔箇出頭處他時一瓣香不敢辜負和尚殊不知失却元初正因却墮在魔界去古人道設有眷屬莊嚴不來自至既是一等踏破草鞋宜應了却初心期脫透生死最為至要時不待人各宜勉力示印禪人道由悟達立志為先自博地具縛凡夫便欲跂步超證直入聖域豈小因緣哉固宜操鐵石心截生死流承當本來正性不見纖塵中外有法使胸次湯然了無罣礙施為作用悉從根本中出根本既牢實能轉一切物是謂金剛正體一得永得豈假外求是故古德云此宗難得其妙切須子細用心可中頓悟正因便是出塵階塹古德隔江招扇吹布毛便有發機處至於驀口𡎺劈脊棒亦解桶底子脫蓋緣專一久之一旦瞥地豈外得之皆由自證自悟耶大梅咨馬師受箇即心即佛便深入閫奧自去住山後聞非心非佛之語便云這老漢鼓弄人家男女有甚了期你但非心非佛我只即心即佛也豈不是有逆水之波覷破馬師漏逗耶藥山示衆云我有一句子待犢牛生兒即向你道當時若不放過但向伊道和坐子敗缺示信侍者學道之要在深根固蒂於二六時中照了自己根腳當大起念百不干懷時圓融無際脫體虗凝一切所為曾無疑間謂之現成本分事及至才起一毫頭見解欲承當作主宰便落在陰界裏被見聞覺知得失是非籠半醉半醒打疊不辦的實而論但於閙閧閧中管帶得行如無一事相似透頂透底直下圓成了無形相不費工用不妨作為語默起倒終不是別人稍覺纖毫滯礙悉是妄想直教灑灑落落如大虗空如明鏡當臺如杲日麗天一動一靜一去一來不從外得放教自由自在不被法縛不求法脫盡始盡終打成一片何處離佛法外別有世法離世法外別有佛法也是故祖師直指人心金剛般若貴人離相譬如壯士屈伸臂頃不借他力如此省要好長時自退步體究令有箇落著諦實證悟之地即是念念遍參無邊無量大善知識也切切諦信勉力作工夫乃善之善也示祖印沙彌永嘉道不離當處常湛然覔即知君不可見只於當處湛然二邊坐斷使平穩切忌作知解求覔才求即如捕影也馬祖云即心即佛又云非心非佛又云不是心不是佛不是物東寺云心不是佛智不是道劒去久矣爾方刻舟若各隨語去豈有定論若忘言契證雖更宣演百千億句亦不過一實且什麼是實處如大梅云你但非心非佛我則即心即佛也豈不實耶要徹底信得及須是親證親見自然不受人謾也示民知庫民禪錦官大慈傳法昭律師之法孫才披削即習家業學四分毗尼既而搯布巾欲離法自淨乃肩錫南遊訪西來宗旨抵夾山因相從住道林久之老僧領蔣山參扣愈堅確其於領略能自擺撥知解要全機直透每應緣酬唱一往直截頗有蘊藉為可喜也然以此根器更效勤息志到極深處無深極妙處無妙大休歇大安穩不動纖塵只守間間地聖凡莫能測萬德不將來然後可以分付鉢袋子也巖頭云却物為上逐物為下萬境萬緣以至古今言教臨機應變若自己根腳虗靜圓明寂照凡來干我能以金剛王寶劒當鋒斬斷則凜然神威坐斷一切不待却而自退豈不綽綽然有餘裕哉儻立本不明稍涉遲疑則被牽引酌然分疏不下豈免隨他所轉既隨他去卒無自由分至道簡易唯却與逐善體道者宜深思之古人為此一段事直得捨全身立雪負舂賣心肝然兩臂投猛火聚七處割截飼虎救鴿捨頭施目百種千端蓋不艱苦則不深到有志之士固宜以古為儔晞顏慕藺也圓湛虗凝道體也展縮殺活妙用也善遊刃能操守如珠走盤如盤走珠無頃刻落虗亦不分世法佛法直下打成一片所謂觸處逢渠出沒縱橫初無外物淨倮倮阿轆轆以本分事印定頭頭上明物物上了何處更有得失是非好惡長短來但恐自己正眼未得洞明是致落在二邊則沒交涉也豈不見永嘉道上士一決一切了中下多聞多不信佛祖言教筌耳藉之以為入理之門既廓然明悟承當得則正體上一切圓具觀佛祖言教皆影響邊事終不向頂𩕳上戴却近世參學多不本宗猷唯持擇言句論親疏辨得失浮漚上作實解是誇善淘汰得多少公案解問諸方五家宗派語一向沒溺情識迷却正體良可憐慜有真正宗師不惜眉毛勸令離却如上惡知惡見却返謂之心行移換擺撼煅煉展轉入荊棘林中所謂打底不遇作家到老只成骨董省要處不消一劄皮下有血知落處苟或躊蹰則失却鼻頭也七佛已前便與麼直須硬糾糾緊著頭皮分明歷落薦取這一片田地穩密長時乃自會退步終不道我有見處我有妙解何故箇中若立一絲毫能所見刺則重過山嶽從上來決不相許是故釋迦文於然燈佛以無法得授記盧老於黃梅以本來無物親付衣鉢至於生死之際才自擔荷則如靈龜曳尾應須淨穢二邊都不依怙有心無心有見無見似紅爐著一點雪二六時中透頂透底灑灑落落遊此千聖不同途處直下令純熟自然成就得箇絶學無為千人萬人羅籠不住底真實人也趙州和尚見僧喚云近前來僧近前州云去多少省力若薦得乃是十成若作如之若何則知見生也古人有具大慈悲見人當面不自承當方便撥正通箇入路如古堤見僧來便云退後退後汝無佛性後來只有箇仰山能知渠端的如今拈問學者十箇有五雙茫然為向伊句下死了所以無瞥地分若據活處如何吐露切忌隨他語句好靈雲作頌悟桃花玄沙言渠未徹老婆臺山指路趙州歸來説勘破叢林中作種種論量只贏得閙殊不知古人如敲門瓦子相似只貴得入門既入得門了安可執却瓦子作奇特事謂諦當直截顯露落在甚處還委悉麼毫氂有差天地懸隔入荒田不揀信手拈來草其奈亦能殺人亦能活人苟或著得眼正下得手親則一莖草可使作丈六金身況其他變化乎根本既明於日用中鋤田墾土春種秋收無非與夾山老子親唱酬地藏阿師展演同一梵行踐履純熟高據毗盧傳此正法豈不妙哉送自聞居士出京何處踏著來若是移舟諳水勢舉棹別波瀾何消抵死叮嚀自可一揮便了所以風馳電閃擬議則千里萬里去也只接俊流不管懵底是故垂鉤四海只釣獰龍格外玄機為尋知識既達此宗觀一切世出世間曾不移易一一透頂透底便解放身捨命於萬別千差境界恬然不動縱遇風刀恆坦坦假饒毒藥也間間儻不踐履長養安能揭日月大通大明自在出沒此地從來無向背直須撥轉上頭關示湧道者尼古人為此大法捐軀捨命歷無邊無量辛勤及至洞明奧旨鄭重如至寶保護如眼睛造次動轉不令輕觸才起一毫勝解知見即若雲翳青天塵昏鏡面故趙州道我在南方三十年除粥飯二時是雜用心處曹山指人保任此事如經蠱毒之鄉水也不得沾他一滴始得以忘心絶照踐履到如如實際無事於心於心無事平淡無為超然獨運自既腳踏實地方可為人解去黏縛度盡一切人實無人可度直須用取最後句物物頭頭有出身之地也示實上人古人念此大事雖處深山幽谷村落間未嘗斯須違背遇境逢緣若色若聲動作施為無不回轉令就自己分上與從上來透徹之士所履踐無二無別所以根本牢強不隨境界風轉靜然安間不落聖凡情量直下大休大歇得坐披衣今汝既還鄉井能如昔人覷捕使無間然與鐘山方丈捶拂之下以至三條椽下七尺單前何以異哉若稍違背及有間斷打入沒交涉處臨岐切記斯言異時前程不可逆料矣示樞禪人玄學之士見性悟理踐佛階梯是家常茶飯須知佛祖頂𩕳上有換骨妙致方可越格超宗作向上人舉措使德山臨濟無施作用處平時只守間間地初不立伎倆似三家村裏人頑然癡兀直得諸天捧花無路魔外潛覷不見漠然不露毫芒圭角如居萬億寶貨深藏牢鎖土面灰頭與傭保雜作口亦不言心亦不念一世人莫測而神意泰然豈非有道無為無作真無事人耶解語非干舌能言不在詞明知古人舌頭語言不是依仗處則古人半句一言其意唯要人直下契證本來大事因緣所以修多羅教如標月指祖師言句是敲門瓦子知是般事便休行履處綿密受用處寬通日久歲深不移易拈弄收放得熟小小境界悉皆照破割斷不留朕迹及至死生之際結角羅紋不相參雜湛然不動翛然出離此臘月三十日涅槃堂裏禪示實禪老威音已前無師自悟一往超證千聖同途放得行把得住作得主渾圝成現不須煅煉而自純熟及至威音已後雖自有超卓處直下承當到無疑之地要須依師決擇印可使成法器不爾必有魔孽壞破正因是故有祖以來資授師傳最貴師法何況此箇事非世智辨聰所了非聞見覺知所拘苟不操勇猛大丈夫志氣能擇真正善友知識截生死流破無明殼孜孜參扣久之專一時節緣稔驀地桶底子脫廓然省悟然後投誠決擇證據自然如下水船不勞篙棹乃為針芥相投既得旨之後綿綿相續管帶令無間斷長養聖胎縱逢境界惡緣能以正知見定力融攝之使成一片則生死大變不足動自己胸次養得歲深成箇無為無事大解脫人豈不是能事已辦行腳事畢耶示瑛上人此事在當人快利既承當擔荷知有自己根腳尤宜卓卓特立獨行須絶情離照俾廓然空寂無一法可得截斷諸緣令灑灑落落到大安穩之地綿密無滲漏所謂壁立萬仞峭巍巍地然後却回來涉世應物初無我相豈有聲色順違魔佛境界耶最難是等間不作意處驀地被牽轉便漏逗也應須相續管帶使勿走作久之打成一片乃為歇場更須會取向上行履始得古德云得坐披衣向後自看示泉上人參問要見性悟理直下忘情絶照胸襟蕩然如癡似兀不較得失不爭勝劣凡有順違悉皆截斷令不相續悠久自然到無為無事處才有毫髮要無事早是事生也一波才動衆波隨豈有了期它時死生到來腳忙手亂只為不脫灑但以此為確實自然閙市裏亦靜如水豈憂己事不辦耶才有是非紛然失心只這一句驚動多少人作計較若當頭坐斷透出威音王那邊若隨此語轉特地紛然應自回光返照始得如來禪祖師禪豈有兩種未免媕含各分皂白特地乖張事理機鋒一時坐斷是打淨潔毬子還知著實諦當處麼放下看取示思禪人一切萬法皆與自己無違無背直下透脫成一片從無始以來只恁麼但恐當人自相違背強生取捨無事生事所以不快活若能外絶攀緣內忘己見即物是我即我是物物我一如洞然無際則二六時中四威儀內一一皆壁立萬仞何處有如許勞攘來每見久參凝神澄照既多時雖然有箇入處驀地便認一機一境硬把住不受撥剔此正大病也要須銷融放下自得大休歇處始得示傑上人行腳參請既依附知識於大叢林陪清高雅衆久矣一旦以親緣須著略歸動是數百里遠行要須以自力量不忘履踐直教行處不生塵況此段事不道在知識身邊時便有居鄉井便無也所謂暫時不在如同死人正當在時亦不起模畫樣雖則平常而滴水滴凍卓然絶識成箇無為無事無心事業表裏洞然無際不與萬法為侶不與千聖同途深根固蒂只守間間地養來養去不憂不徹但盡凡情作自己工夫勿管外緣勿逐名利起我見競勝負是故古德道任運猶如癡兀人他家自有通人愛傑禪人倐來告別求警䇿因書此語授之示成修造蔣山門下無禪可説無道可傳雖聚半千衲子唯以箇金剛圈栗棘蓬跳者著力跳吞者用意吞莫怪沒滋味太險峻或若驀地體得如晝錦還鄉千人萬人只仰羡得要且覔他所從來不得所謂人人本分事也才生心動念承當擔荷早是不本分了也直得萬機休罷千聖不攜奈猶有依倚在快須擺撥透脫那邊去始得所以道但有纖毫即是塵舉意便遭魔所撓成就一切總只由他破壞一切亦只由他奇特殊勝緣恆沙功德藏無量妙莊嚴超世希有事皆所成就慳貪憎妬情識執著有為有漏垢染雜亂解路名相知見妄情所破壞也唯它能轉一切物一切物不能轉它雖無形段面目而包括十虗舍凡育聖若作相取取之即墮見刺卒摸𢱢不著諸佛開示祖師直指唯此妙心徑捷承當不起一念透頂透底無不現成於現成際不勞心力任運逍遙了無取捨乃真密印也佩此密印如暗藏燈遊戲世間不懷欣怖盡是我大解脫場永劫窮年曾無間斷所以道丈六金身作一莖草用一莖草作丈六金身用豈有他哉雪峰道是什麼雲門道須彌山洞山道麻三斤趙州道喫茶去巖頭噓投子噁臨濟喝德山棒擎杈舉指打鼓拽磨一一顯向上宗風頭頭示本分草料大達之士一覷便透一舉知落處堪紹宗風懵底數沙當面蹉却是故須得俊流乃作種草示逾上人有志之士欲決定信入此箇大事要須將從前智慧聰明所解所知倒底放下令如癡兀胸中空勞勞百不知百不解千休萬歇萬歇千休驀然從本地風光上倜儻透脫前後際斷徹證自得契金剛正體如斬一綟絲頓然齊了雖劫火洞然初無變異信得及把得住作得主一為一切為一了一切了餉間移身換步萬種作為渾歸一體更説甚世法佛法頭頭物物觸處現成便與佛祖無殊亦與群靈無異蓋根腳既明無幽不燭信手拈信步行信口言元非它亦不從別處轉謂之大施門開百千妙用縱橫十字透頂透底明證佛性長時無間一得永得踐履純熟豈不是省要得力處但恁麼信入斷定不誤人僧問雪峰學人乍入叢林乞師指箇入處雪峰云乍可碎身若微塵終不瞎箇師僧眼且古人恁麼意在甚處若善參詳不妨回避不得須有箇入路若只隨言逐義則蹉過不少我早是不惜眉毛了也僧問石頭如何是道頭云木頭又問如何是禪頭云碌磚奇怪古人忒晒直截略不回互所謂親切太近有智見足計較底如隔銀山鐵壁不然則認口頭言語便當宗乘則轉更周遮是故真實道人只務純朴不生知見直下承當只恁麼注解已是土上加泥數百重不如還我石頭本分草料來三祖云要急相應唯言不二若據山僧只箇不二早是二了也參趙州勘破婆子叢林議論千萬多作見解殊不知他古人自在乾淨處立看你向泥坑子裏頭出頭沒馬師云待你一口吸盡西江水即向你道信此老踏殺天下人只等間出一語便令作無限知見若有解截這老漢葛藤便請罷參示淨禪人淨道人因入室遂請益所疑云此一段事為何宗師多示人這邊那邊尋語之據本分截斷豈有如許然垂手方便貴圖箇入路乃強分之意實無二種耳不見僧問曹山古人提持那邊人教學人如何趣向山云退步就己萬不失一其僧有省所謂識取鉤頭意莫認定盤星只要及盡今時便承當得向上事且今時作麼生及得盡只在當人快著精彩擺撥緣塵直令𮌎中脫灑不立纖毫透頂透底洞然虗寂切忌作勝量解會直待與本來相應自然自悟自證得大安穩之地也此豈紙上所能話會耶請自著眼看示堅道者佛祖妙道徑截唯直指人心務見性成佛爾但此心源本來虗靜明妙初無纖毫隔礙而以妄想翳障於無隔礙自生染障背本逐末枉受輪回若具大根器更不外求於自腳跟脫然獨證惡覺浮翳既消本來正見圓妙謂之即心即佛從此一得永得如桶底子脫豁然契合無一法當情覿體純靜受用無疑則一了一切了及至聞説非心非佛并親臨違順好惡境界則一印印定何有彼我異同種種混雜知見耶是故古德於一機一境一語一默投誠入理千門萬戶了無差殊譬百千異流同歸大海自然居之既安用之透徹作箇無為無事絶學道人去也二六時中不生別心不起異見隨時飲啖衣著萬境萬緣無不虗凝雖千萬年不移易一毫髮許處此大定豈非不可思議大解脫耶唯要長時無間斷不墮內外中間有無染淨直下休歇去見佛衆生等無差殊乃是十成安樂之地也今既已有趣向只在長養令純熟煅來煅去如百煉精金方成大法器也示尚禪人幸自圓成何須特地直饒以慈悲之故信手拈來也未免強生枝節却返不如未露鋒鋩已前只如今恁麼涉水拖泥不少只得就裏分踈還委悉麼一粒之中藏世界普天匝地應時收示瑛上人道本無言因言顯道若真體道之人通之於心明之於本直下脫却千重萬重貼肉汗衫豁然契悟本來真淨明妙沖虗寂淡如如不動真實正體到一念不生前後際斷處踏著本地風光更無許多惡覺知見彼我是非生死垢心拔白露淨信得及與他從上來人無二無別等間不作為不確執虗通自在圓融無際隨時應節喫飯著衣契證平常謂之無為無事真正道人蓋緣根本既明六根純靜智理雙冥境神俱會無深可深無妙可妙至於行履自會融通喚作得坐披衣向後自看終不肯只向言句中話路古人公案間埋沒鬼窟裏黑山下作活計唯以悟入深證為要自然到至簡至易平常無事處然亦終不肯死殺坐却墮在無事界裏是故從上作家古德行棒行喝立宗旨明與奪設照用三要三玄五位偏正峻機電卷言前格外旁提正按只貴當人活卓卓地千人萬人羅籠不住知有向上宗乘終不指注定殺掘坑埋人若有如此者定是弄泥團非慷慨透脫真正具眼衲子所以不喫人殘羹飯被繫驢橛子綴住不唯埋沒宗風抑亦自己透脫生死不得況復展轉將路布窠窟解路傳授與後學遂成一盲引衆盲相將入火坑豈是小禍復令正宗只見淡薄祖佛綱紀委地豈不痛哉所以學道先須擇正知正見師門然後放下復子不論歲月用做事綿綿相續不怕苦硬難入參取管須徹去不見睦州道未得箇入頭須得箇入頭處若得箇入頭處不得辜負老僧既操誠日久大經鉗鎚洪爐煅煉日近日親田地穩密只更辦悠久管帶使如證如悟始終無間世法佛法打成一片物物頭頭有出身處不墮塵機不為物轉閙市裏十字街頭活浩之中正好著力也五祖老師平昔為人最捷徑每示徒多舉古德有漏笊籬無漏木杓大乘井索小乘錢貫覿面相呈時如何分付典座如何是玄旨壁上挂錢財謂學人你若使與麼會得徹底去便可罷參所謂唯此一事實直得赤心片片不隔一絲髮許若真究得到此田地始堪提持綱宗傳正法眼也示升禪人參問之要在專一不強作為只守本分須根腳有透脫處明見本來面目踏著本地風光初不改移尋常行履而表裏一如任運施為不立奇特與泛常人無以異喚作絶學無為間靜道人而自處之際不露心迹直得諸天捧花無路魔外潛窺不見始是朴實頭著實處也養來養去日久歲深世法佛法打成一片混融無際力用現成透脫死生豈為難事但患證入處不諦當𮌎中有物則留礙也要急相應當須旋有旋消如紅爐著雪相似自然廓然安靜得大解脫也但自退審親附知識不為不久所以履踐處還有端的落著也未若有落著更疑箇甚麼直下不起一念脫體承當一處才真千處萬處豈更別也祖師只要人見性諸佛只令人悟心心性既真純一無雜則四大五蘊六根六塵一切萬有無不皆是自己放身捨命處等間蕩蕩地如日普照如虗空無邊量豈以有限身心返自拘局令不快活耶古人十年二十年只要參透一透之後便解作活計如今豈是欠闕但不起要情不生執著隨力遇緣靡不通徹唯貴專一純靜雖幹事緣亦非外物攝歸自己即為妙用八萬塵勞即時化作八萬波羅蜜更不須別參知識於日用中度無量數衆生成就無量數佛事歷涉無量數法門皆從自己𮌎中流出豈有他哉所謂百尺竿頭須進步大千沙界現全身示民上人學道深宜退步體究但以死生為念世諦無常是身非堅久一息不來便是異世他生或若論入異類轉更千生萬劫無出徹處幸而今富有春秋正好著力念念趣向心心不移向根腳捕到一念不生前後際斷處驀然透徹如桶底子脫有歡喜處極奧窮深踏著本地風光明見本來面目不疑天下老和尚舌頭坐得斷把得住以無心無為無事養之二六時中更無虗過底工夫心心不觸物步步無處所便是箇了事衲僧也不圖名不苟利壁立萬仞滴水滴凍辦自己透脫生死事不管諸餘不動聲色不驚群衆翛然獨脫真出塵羅漢也切宜信而履踐昔蒙山惠明道人自黃梅趂遂盧老到大庾嶺及之遂咨稟不為衣鉢來只為法來盧乃令坐於磐石冥心因語之云汝但善惡都莫思量正當恁麼時一物不思還我明上座本來面目來明依言斂念尋有省發乃復問盧為只這箇為當更別有密意盧云我若向你道即不密也只如上説汝若會即密在汝邊矣蒙山乃了了無疑將知密意即是密印若體得老僧所示心地豁然密印豈在別人邊密説顯證皆只於剎那頃才生心動念即沒交涉也示心道者有祖以來直指此一段大因緣政為透脫生死須是上根利智超言詮出情域不以世緣彼我高低強弱衰榮為意徑於自己根腳下了悟取本來清淨寂照虗凝輝騰今古迥絶知見底本分事便翛然獨立萬象不能藏覆千聖無以擬倫等間蕩蕩地一物不思一物不為自然無欲無依超諸三昧更説甚建立門戶差別作為直下坐斷壁立千仞凡亦不拘聖亦不管方是了事衲僧身心如枯木杇株寒灰死火乃真休歇也所以從上來只貴忘懷獨得既得之後不立我見不自貢高任運縱橫如癡似兀始稱無為無事道人行履設使三五十年亦不變亦不異至於千生萬劫亦只如如所謂長久最難得人也若一往恁麼信得及透得徹不憂不能度世跳煩惱生死坑唯在當人諸根猛利超毗盧越祖代亦不為難此真大解脫門也達磨祖師初來少林九年面壁冷坐深雪之中得箇可祖洎勘證所得只禮三拜依位而立此豈涉許多言詮耶要須直下領取透頂透底纖芥無違現成撲不破萬機莫能到然後於無住本中流出一切融通無滯百千作為皆我妙用處處與人抽釘拔楔令各安穩去豈不省要哉玄沙一日見人舁尸過指而示衆四箇死漢舁一箇活漢若隨情見却是玄沙自相顛倒若以向上正眼離見超情乃知玄沙為人極是親切是故透脫須出他陰界不見古德道白雲淡濘水注滄溟萬法本間而人自閙果是真實諦當聊聞舉著便知落處可以透脫生死不在陰界中窒礙如鳥出籠自由自在自餘一切機用言句只一截便休更不落第二見也示照道人尼釋門奇特徑截超證速與般若相應無出禪宗此乃如來最上乘清淨禪也自靈山拈花金色頭陀微笑迦文付授涅槃妙心正法眼藏教外別行單傳心印歷代四七至達磨西來直指人心見性成佛無論凡聖久近但根器相投一念透脫更不假三僧祇劫便證本來圓成淨妙調御是故遊泳此宗資大法器從初立志跂步便要超卓所謂立地成佛暫時斂念便證無生不立前後際不從他得惟是自己分上猛利操修如斬一綟絲一斬一切斬性靈瞥脫前念是凡後念是聖擬不擬凡聖一如含吐十虗更無方所永嘉道爭似無為實相門一超直入如來地法華會上龍女獻一珠即成正覺豈非轉念便證妙果耶蓋此法天地不能覆載虗空不可包容蘊在一切含靈根腳為一切依倚長時淨倮倮無處不周但為情識所拘聞見所隔妄認緣影為心四大為身不能證得此正體所以諸聖以悲願力指出示人令一切群生有根器者回光返照單拈獨證去只如龍女所獻之寶即今在甚處若才舉著便和坐子承當得終不向語言中作解會心機意想裏作窠窟便與靈山無垢世界無二無別也從上來唯貴最初一念最初一句念未生聲未發直下截斷千聖靈機萬靈印契一時劃破可不是脫灑自由得大自在要妙處耶龐居士問馬大師不與萬法為侶是什麼人馬師云待汝一口吸盡西江水即向汝道此箇公案多有涉唇吻商量作機境解會殊不稟宗猷也要須是箇生鐵鑄就底方能逆流超證乃解翻却二老鐵船始到壁立萬仞處方知無許多事示倫上人一切有心天地懸隔酌然如今透關不得只為心多執重若脫然拼當到無心之地一切妄染情習俱盡知見解礙都銷更有甚事是故南泉云平常心是道然才起念待要平常早乖差了也此最為微細難湊處沒量大人到箇裏踟蹰何況學地直須抵死謾生咬嚼教斷直似大死底人絶氣息然後蘇醒始知廓同太虗方到腳踏實地深證此事明得徹信得及等間蕩蕩地百不知百不會才至築著便轉轆轆更無拘制亦無方所要用便用要行即行更有甚得失是非通上徹下一時收攝此無心境界豈是容易履踐湊泊要須是箇人始得若未如此當須放下身心教冥然地無一毫許依倚覷來覷去日久歲深自然蓋天蓋地觸處現成未有天生釋迦自然彌勒阿那箇在娘肚裏便會直應快著精彩時不待人驀然一咬咬斷也不奈你何大丈夫須到自得自由自在處始得示正上人參請固欲利根乘機便領初無凝滯亦須深信純熟取效長久向衣單下作工夫所謂休去歇去唇上醭生去如古廟香爐去蓋此乃透脫生死超凡情越彼岸尤宜大忘人間雜務辨利聰明未出世間只增虗妄祖師西來唱此一段要人直下徹證了却無始無明住地令淨盡無遺明證本地風光明見本來面目雖千聖萬聖出來不移易絲毫許謂之直指人心見性成佛豈可只隨言逐句作機境事路布圖廣知見待欲勝人而取名利哉固非此理既是有志之士一等踏破草鞋須究箇徹頭處只如僧問雲門如何是諸佛出身處對云東山水上行他豈不是徹了恁麼道一葉落合知秋更待言句上生言句知解上作知解爭得徹去若體得雲門此意古今言句一時穿過但辦肯心與麼靠將去甕裏豈曾走鱉是故古德云靈利漢聊聞舉著剔起便行示性然居士道山性與道合喜恬靜不尚藻飾宿蘊深信尤慕玄學每宴寂通宵徹夕冥默內照瑩徹如冰壺玉鑑表裏洞然而蔬食長齋究向上宗乘遍參知識一以誠至探窮有年歲矣始則循見歷語句合頭窠窟八穴七穿遊歷築底其志愈確驀地脫去直徹佛祖心性淵源深入理妙踐履説宗二通融攝涅槃生死到身心一如勝淨之地機智增明頓轡自樂久之猶不自已圖就諸方達道上上大機碎佛見法見大用明了上頭關捩展拓烹煅爐鞴擺撥玄妙擇拼廉纖提持殺活綱宗超脫聖賢閫域正到辨邪正識休咎知進退別機宜誠實之地恰欲整安間之車遊虗寂之境徑直湊無為無事羅籠不住呼喚不回超毗盧越釋迦莊嚴清淨自在大解脫之域適以世緣暫時挽綴渠處之亦翛然有志之士以無量阿僧祇為頃刻當亦綽然遂本源爾乘涼相過遇紙筆作此示慧空知客諸佛出世祖師西來鞠其旨歸斷無他事唯以同體大悲無緣等慈揭示此段大因緣圖利根上智越格超宗直下領略所謂教外別行單傳心印是故於十萬衆前拈花只有迦葉特證不覺微笑由是釋尊付授而達麼遊梁歷魏尋人在少林面壁久之獨得二祖深信立雪斷臂一言之下安心遂傳衣鉢此豈小事哉蓋從上來皆聖賢應世主勝根強龍象蹴踏源既淵深流不短淺自四七二三之後間世英靈相繼傑出如思護馬師石頭寰中獨步德山爇疏鈔臨濟燒禪板藥嶠天皇百丈黃蘗及五家宗主各立門風如布縵天網垂萬里鉤莫不透頂透底有過千萬人作略出沒卷舒擒縱照用權實豈只守一途一轍一知一見存窠臼立知解死水裏浸殺以實法繫綴人所以遍寰海列剎相望數百年綱宗不墜的的相承源源相繼非單見淺聞皮膚幽陋所能負擔要是蘊卓識奇姿跂步越佛祖器量蓋天蓋地初出窠來迥然殊絶先了却自己根腳靠本色咬豬狗手段大達宗師向順違境界透脫辦粉骨碎身志見圖大不圖細圖遠不圖近於千艱萬苦至難至嶮如銀山鐵壁處放身捨命撒手那邊承當此大事因緣絶情離見歇却狂機業識闢大解脫門了却自己生死大事酬初發心志視六根四大五蘊十二處十八界七大性如虗空狂花亂起亂滅唯全稟承不思議乃祖乃佛所證廓徹靈明廣大虗寂金剛正體深根寧極餉間舉一毛一塵一機一句靡不從根本中發雖謂之大機大用早是胡亂名摸了也更向甚處著心著性著玄著妙著理著事到箇裏如紅爐上一點雪聞禪與道削迹吞聲猶未是極致況其餘光影色聲山河大地露柱燈籠眼見耳聞擔枷抱鎖豈不見德山入門便棒臨濟入門便喝睦州現成公案子細看來渠已是入泥入水老婆心切所以道若一向舉揚宗教法堂上須草深一丈自餘方便門軒知是不得已抑而為之是皆從上來大善知識垂慈運悲作異世標榜使有志之士窮到撲不破處八面玲瓏匪唯自利亦以利人傳無盡燈續佛惠命自唐歷五季以至國初負重望據祖位龍馳虎驟奔南走北與人拔楔抽釘解黏去縛者何限近世不道無人求全材獨脫奮本分鉗鎚啓作家爐鞴誠不可多得蓋緣師因循淺陋資又無深根固蒂只圖易曉便如膠漆使祖宗無上道妙高遠大機或幾乎絶矣尚賴後昆有拔類離倫底與古為儔不顧是非得喪彼我取捨以鐵石心辦不可卷不可移之志攻苦食淡不怕艱難向前體究可以繼芳躅續往世高風為人間明燭作昏衢日月此私心常所渴望者也今既憤悱圖起發切在盡始盡終擇海上具殺人不眨眼手段宗師圖取徹去則豈唯酬自己超方本心抑亦於佛法大海出一隻手矧此門絶人我離愛憎只貴正知正見安在乎論誰家之子哉等是曹溪門下何有彼宗此派於其間也示張直殿契證佛祖道妙最宜上智利根忘懷體究不墮機境直下拔萃超群虗心領略直得圜明廣照透地通天徹生死根源出葛藤路布𮌎中灑落一念不生前後際斷一句當陽脫去解會諦實取證了無疑惑如昔則老問青林如何是佛對云丙丁童子來求火渠便入語言作道理便謂丙丁是火更來求火如我是佛更去問佛及至法眼究窮撥正他即大不信及翻然投誠法眼亦只如前云云渠大悟蓋當風證驗始解回光更不作惡知惡解當下如暗得燈如貧獲寶此豈小事哉誠實諦信千萬億劫長得受用是故道本無言因言顯道若得此道斷不在言句上後番才有言句知得底裏便七縱八橫顛來倒去腳踏實地乃不隨語生解遂能自在出沒豫奪莫不窮源極本從上大達之士無不經此場地琢磨煅煉方堪行持但熟處放教生生處弄令熟悠久得大機大用見一切萬變千化皆即識得破信得及把得住作得主選甚放光動地千百萬億佛來也不消箇了字巖頭云却物為上逐物為下若論戰也箇箇力在轉處唯向上轉不落下風便是急著眼處也擬議不來便喚却眼睛也正宜快斷割取久之純熟與摩詰龐老無以異示胡尚書悟性勸善文人人腳跟下本有此段大光明虗徹靈通謂之本地風光生佛未具圓融無際在自己方寸中為四大五蘊之主初無污染本性凝寂但為妄想倐起翳障之束於六根六塵為根塵相對黏膩執著取一切境界生一切妄念汩沒生死塵勞不得解脫是故諸佛祖師悟此真源洞達根本憫諸沉淪起大悲心出興于世正為此耳達磨西來教外別行亦為此耳只貴大根利智回光返照於一念不生處明悟此心況此心能生一切世出世間法長時印定方寸孤迥迥活鱍鱍才生心動念即昧却此本明也如今要直截易透但放教身心空勞勞地虗而靈寂而照內忘己見外絶纖塵內外洞然唯一真實眼耳鼻舌身意色聲香味觸法皆依他建立他能透脫超越得如許萬緣而如許萬緣初無定相唯仗此光轉變苟信得此一片田地及則一了一切了一明一切明便能隨所作為皆是透頂透底大解脫金剛正體也要須先悟了此心然後修一切善豈不見白樂天問鳥窠如何是道窠云諸惡莫作衆善奉行白云三歲孩兒也道得窠云三歲孩兒雖道得八十老翁行不得故應探過正要修行如目足相資若能不作諸惡精修衆善只持五戒十善之人亦可以不淪墜何況先悟妙明真心堅固正體然後隨力修行作諸善行令一切人不迷因果知地獄天堂之因皆自本心作成當平持此心無我人無愛憎無取舍無得失漸漸長養三十二十年逢順違境界得不退轉到生死之際自然翛然無諸怖畏所謂理須頓悟事要漸修多見學佛之儔唯以世智辨聰於佛祖言教中逴掠奇妙語句以資談柄逞能逞解此非正見也應當棄舍冥心靜坐忘緣體究逗到徹底玲瓏於自家無價無盡寶藏中運出何有不真實者哉却須先悟了本來明見即心即佛正體離諸妄緣翛然澄淨然後奉行一切衆善起大悲饒益有情隨所作為皆是平等無我無著妙智顯發通徹本體善行豈不妙哉所以道但辦肯心必不相賺以悟為則莫嫌遲晚珍重示張宣機學士從上大達之士單提密傳此最上獨脫一著子極為省要唯務利根上智機應相投直下領略幾時有如許般次向上向下理性玄妙正偏主賓語言作用才生解會即被羇勒更無自由分是故本分作家終不上人釣鉤落人圈圚唯自洞明照了𮌎次不留毫髮超然孤高不與萬法為侶不與千聖同廛脫白露淨湛然虗凝至於涉緣應機如飛劒輪如聚猛火安可近傍語默有無動靜彼我一併截斷是故道末後一句始到牢關把斷要津不通凡聖不得已謂之一句謂之正位謂之頂門謂之金剛王才得此意歷落通透情塵意想見解勝智自然銷融時中寬廣獲大自在以此修身行己以此定國安澤及生民位望轉隆心術愈正而能不居其功不有其德萬世一時萬年一念十方猶目擊造化握掌中只是箇轉物回天易地納須彌於芥中擲大千於方外豈難為哉既已深諦更資淘煉使轉有力量而不勞神泰然大定豈止窮此生盡未來際罔不資此遇同道同證不舉而知不言而契捨此置而勿論可也傳曰如來有密語迦葉不覆藏獨迦葉能不覆藏乃所以為密爾示同龕居士傅申之學士大夫相見多論理性差近根本即廣知見該涉玄妙通天人之際會同三教為通儒以之著述欲垂名異世頗顧踐履立節退聽修賢業有至膚淺要涉獵以資談柄尚口好勝用伏同列增長我見皆非正因雖賢於拍盲不知信向任自己單見淺聞而生毀訾昧果迷因墮入流俗者然比之真實虗心潔己刻苦退步忘懷契證腳踏實地透根塵絶伎倆與古為儔如維摩大士給孤長者之流克證道果超世出世只如唐朝裴相國陸亘大夫陳操尚書王敬常侍于襄陽李習之鄭愚韋宙莫不悉心體究盡平生得受用我宗尤洞明出沒窮深極奧楊大年內翰李駙馬都尉便可與龐居士並驅蓋具大力量在仕路不捨宰官遊方之外提佛祖巴鼻鉗鎚世人操同事攝向鴛鷺行中出作方面與大宗師為內外護豈非夙昔承靈山記莂發百劫千生煉磨願行而闡如是機緣耶近世佛法雖澆漓而衣冠貴胄深信者極夥殊有古風要是前三流中相半儻有志乎此段須攀上上大機勿作中下體度則超凡出塵得大解脫為不難唯是專一久長逢境界惡緣直截撥斷所謂假使鐵輪頂上旋定慧圓明終不失李渤拾遺出守九江與拭眼歸宗相值一面投契一日驀問教中道芥子納須彌豈有是理耶歸宗云人傳公為李萬卷是不對曰然宗云觀公身不滿三尺萬卷書甚處著李即領旨此豈可與著相執情守見者論量哉要是因指見月忘筌得魚兔者根器乃可以不守方便窠窟爾直一舉便知落處然後頴脫到七通八達之地顯大受用矣韓文公問大顛愈公務事繁佛法省要處請師一言顛只據坐公罔然是時三平侍立即撫禪床一下云侍郎和尚道先以定動後以智文公大喜曰禪師佛法峭峻愈却於侍者處有箇入處利根種性一撥便轉看他師資互作方便向不可名不可言處發揮非韓公俊快安能領略所謂揮斤者敏手亦須受斤者有不動之質然後二俱入妙不然則成一場漏逗爾觀此那假日日入室朝朝咨參是故昔人隔江招扇渠便橫趨而領今恁麼形紙墨乃知而故犯也示黃聲叔相逢不拈出舉意便知有子細點檢已是涉水拖泥況其餘周遮則通人分上宜乎峭絶豈容紛拏蓋此箇獨許灑灑落落雖電卷星馳未免蹉過只恁麼舉覺過犯彌天如未相逢未舉意時直下領略存乎其人不可更教形文彩作知解去也珍重珍重示曾待制僧問趙州如何是祖師西來意州云庭前柏樹子天下參問以為模範作異解者極多唯直透不依倚不作知見便能痛領才有毫髮見刺則黑漫漫地豈不見法眼舉問覺鐵觜趙州有箇庭前柏樹子話是不覺云和尚莫謗先師先師無此語但恁麼體究便是古人直截處也嚴陽尊者問趙州一物不將來時如何州云放下著者云一物不將來未審放下箇什麼州云看你放不下嚴陽遂大悟後來南禪師有頌云一物不將來兩肩擔不起言下忽知非心中無限喜毒惡既忘懷蛇虎為知己寥寥千百年清風猶未已但試自頻舉一物不將來時如何州云放下著驀然便省也不難僧問雲門不起一念還有過也無門云須彌山此又直截省要也無事虗心靜慮且下鈍工夫只管舉看久之當自有入處示呂學士初祖達麼到梁見武帝合下只用箇頂𩕳上一著子而武帝不薦使人到今扼腕後來多少人汩泥汩水去它腳迹尋卜度作百千異解要且不曾夢見只是機緣上生機緣見解上起見解所以道劒去遠矣爾方刻舟當時能截斷箇胡漢則不到帶纍人處所謂知恩方解報恩且作麼生截得它斷寄蜀守蘇仲虎大法本平常在利根精敏寬通不作聰明了之為易入每患知見太多遂汩此源轉窮轉遠莫能透徹若一切平心心亦了不可得泯然自盡則本性圓明混成不假造作截流深證無過與不及處乃造天真機要所謂著手心頭便判是也日用之間常令成現豈不泰定哉古人悟心悟此心也發機發此機也自可萬世不移只守間間地超然獨得更無對待若有對待則成兩立便有彼我得失莫能腳踏實地更進一步一法不立然後怗妥明見本來人去却𮌎中物喪却目前機脫體安穩永離退轉得無所畏方便可以拯濟群靈政須長久相續無間乃善
